# Echoroo dev Redis configuration (006-permissions-redesign, NFR-007).
#
# Enables TLS, password auth (requirepass) and ACL-based authentication.
# This config is intended for the local Docker compose dev stack only;
# production deployments must use stronger secrets managed outside VCS.

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
# Disable the plain-text port (clients must use TLS).
port 0
# Expose only the TLS port.
tls-port 6379
bind 0.0.0.0
# Protected-mode disabled in dev: we already enforce TLS + ACL + AUTH, and
# Redis's protected-mode rejects all non-loopback connections when the
# default user has no password — which conflicts with our ACL-based design
# where `default` is intentionally `off nopass` and only the `echoroo`
# user is allowed to authenticate. Production deployments should keep
# protected-mode enabled and set a password on the default user.
protected-mode no

# ---------------------------------------------------------------------------
# TLS
# ---------------------------------------------------------------------------
# Self-signed cert generated via scripts/gen-redis-dev-cert.sh.
# Mounted read-only into the container at /etc/redis/tls/.
tls-cert-file /etc/redis/tls/redis.crt
tls-key-file /etc/redis/tls/redis.key
tls-ca-cert-file /etc/redis/tls/ca.crt
tls-auth-clients no
tls-protocols "TLSv1.2 TLSv1.3"

# ---------------------------------------------------------------------------
# AUTH + ACL
# ---------------------------------------------------------------------------
# Default user is disabled in the ACL file below; all clients must
# authenticate via the `echoroo` user.
requirepass echoroo-dev-redis-password
aclfile /etc/redis/users.acl

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
appendonly yes
dir /data

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
loglevel notice
