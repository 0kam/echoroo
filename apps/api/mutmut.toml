# Mutation testing configuration for the Echoroo permission engine (PR-004).
#
# Scope (006 permissions redesign):
#   Required (T995 mandatory):
#   * core/permissions.py          — Stage 1 permission gate + matrix + helpers
#   * core/actions.py              — Action catalog aggregation
#   * services/superuser_service.py — M-of-N approval + lifecycle
#   * services/api_key_verification.py — DbApiKeyVerifier + parse helpers
#
#   Additional (T995 Phase 16 Codex extension):
#   * middleware/auth.py           — get_current_user + stamp helpers
#   * middleware/auth_router.py    — AuthRouterMiddleware prefix dispatch
#   * services/webauthn_service.py — WebAuthn register/verify
#   * workers/dormancy_check.py    — Phase 12 dormancy detection worker
#
#   Existing (maintained from Phase 2):
#   * core/response_filter.py      — Stage 2 response masking / H3 clamp
#   * core/audit.py                — AuditLogSanitizer, hash chain
#   * core/kms.py                  — KMS envelope + GenerateMac
#
# Target mutation score: >= 80 % (spec PR-004, SC-012).
#
# T995 (Phase 16 Batch 6h-1): CI gate promoted from warn-only to hard-fail.
# The `mutation-testing` job in `.github/workflows/ci.yml` now runs with
# `continue-on-error: false` and enforces the 80% threshold.
#
# Invocation from repo root:
#   cd apps/api && uv run mutmut run
#
# Single-module targeted run:
#   uv run mutmut run --paths-to-mutate=echoroo/core/permissions.py
#
# After a run:
#   uv run mutmut results            # summary by file
#   uv run mutmut show <mutant id>   # inspect a surviving mutant

[mutmut]
# Restrict mutations to the 11 permission-critical modules.
# Each module is listed explicitly so new files in these directories are
# not accidentally included (mutation runs are expensive).
paths_to_mutate = [
    "echoroo/core/permissions.py",
    "echoroo/core/actions.py",
    "echoroo/core/response_filter.py",
    "echoroo/core/audit.py",
    "echoroo/core/kms.py",
    "echoroo/services/superuser_service.py",
    "echoroo/services/api_key_verification.py",
    "echoroo/middleware/auth.py",
    "echoroo/middleware/auth_router.py",
    "echoroo/services/webauthn_service.py",
    "echoroo/workers/dormancy_check.py",
]

# Tests directory relative to mutmut's CWD (apps/api/).
# We include unit/ and security/ because:
#   * unit/core/        → permissions, response_filter, audit, kms
#   * unit/middleware/  → auth, auth_router
#   * unit/services/    → superuser_service, api_key_verification, webauthn_service
#   * unit/workers/     → dormancy_check
#   * security/         → auth-path negative suites (SC-012 requirement)
tests_dir = "tests/"

# Runner command used to validate each mutant. The unit + security suites
# cover all 11 modules. We use --no-cov to avoid coverage overhead per
# mutant (significantly speeds up large runs). --override-ini=addopts=
# clears any project-level addopts that would add conflicting flags.
#
# NOTE: the runner path uses `python -m pytest` (not a venv-absolute path)
# so it works in both local (uv) and CI environments without path
# hard-coding. CI installs the venv via `uv sync --all-extras --dev`.
runner = "python -m pytest -x --no-cov --override-ini=addopts= tests/unit/ tests/security/"

# Phase 17 §C-D diagnostics: surface the underlying pytest error when
# mutmut raises BadTestExecutionCommandsException during baseline
# `run_stats`. Without this flag mutmut swallows the pytest exit code
# and only prints "Failed to run pytest with args: [...]". Once mutation
# scoring is verified end-to-end on main, this flag can be lowered.
debug = true

# Backup + cache locations (relative to CWD).
backup = false
cache_only = false

# Minimum mutation score enforced by the CI gate (T995). Survivors above
# this threshold cause the CI job to fail.
# Kept here as documentation; the actual threshold check lives in the
# workflow job (scripts/check_mutation_score.py) for easier per-module
# overrides.
# minimum_score = 80.0

# Files / decorators / imports to skip when generating mutants.
# * `# pragma: no mutate` inline in source is honoured automatically.
# * The legacy ``check_project_access`` stub (scheduled for deletion in
#   Phase 3) is in core/permissions.py but is already marked with
#   # pragma: no mutate by the original author.
# * workers/dormancy_check.py advisory-lock paths require a live PostgreSQL
#   connection; those branches are excluded from mutation scoring per
#   Phase 17 plan (see below).
