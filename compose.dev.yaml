# Echoroo Rebuild - Development Docker Compose
# PostgreSQL + Redis + FastAPI Backend + SvelteKit Frontend
#
# Usage:
#   ./echoroo.sh start    # Start development environment
#   ./echoroo.sh logs     # View logs
#   ./echoroo.sh stop     # Stop

services:
  # PostgreSQL Database with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: echoroo-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-echoroo}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echoroo-net

  # Redis for rate limiting and caching.
  # TLS + AUTH (requirepass) + ACL enabled per NFR-007 (006-permissions-redesign).
  # Generate dev certs once via `./scripts/gen-redis-dev-cert.sh` before first start.
  redis:
    image: redis:7-alpine
    container_name: echoroo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
      - ./config/redis/users.acl:/etc/redis/users.acl:ro
      - ./config/redis/tls:/etc/redis/tls:ro
    command: ["redis-server", "/etc/redis/redis.conf"]
    healthcheck:
      # Health probe must also speak TLS + AUTH. Use the CA to verify.
      test:
        - "CMD"
        - "redis-cli"
        - "--tls"
        - "--cacert"
        - "/etc/redis/tls/ca.crt"
        - "-a"
        - "${REDIS_PASSWORD:-echoroo-dev-redis-password}"
        - "--user"
        - "${REDIS_USERNAME:-echoroo}"
        - "ping"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echoroo-net

  # LocalStack (S3-compatible object storage for development)
  localstack:
    # LocalStack >= 2026.03.0 requires an auth token (container exits with
    # code 55 "License activation failed"). `community-archive` (2026-03-18)
    # is the final token-free community build (4.14.x line); S3 + KMS work
    # token-free in it.
    image: localstack/localstack:community-archive@sha256:6b6172cfceb04b4fbc35097a55f717c365a35fafa572be49f7341771cf9023ed
    container_name: echoroo-localstack
    restart: unless-stopped
    environment:
      - SERVICES=s3,kms
      - PERSISTENCE=1
      # Dual-origin: always keep the localhost variants (SSH port-forward
      # users still arrive as localhost) AND append the public-host variants
      # derived from ECHOROO_PUBLIC_HOST. When PUBLIC_HOST defaults to
      # localhost the public entries collapse onto the localhost ones, so
      # the effective allowlist is unchanged for the default deployment.
      - EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://${ECHOROO_PUBLIC_HOST:-localhost}:${ECHOROO_FRONTEND_PORT:-5173},http://${ECHOROO_PUBLIC_HOST:-localhost}:3000
      - EXTRA_CORS_ALLOWED_HEADERS=content-type,x-amz-content-sha256,x-amz-date,authorization,x-amz-security-token,x-amz-checksum-sha256
    ports:
      - "4566:4566"
    volumes:
      - ${ECHOROO_LOCALSTACK_DATA:-./.data/localstack}:/var/lib/localstack
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
    networks:
      - echoroo-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend FastAPI Server
  backend:
    build:
      context: apps/api
      dockerfile: Dockerfile.dev
    container_name: echoroo-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    ports:
      - "${ECHOROO_API_PORT:-8002}:8000"
    volumes:
      # Mount source code for hot reload
      - ./apps/api/echoroo:/app/echoroo:ro
      - ./apps/api/alembic:/app/alembic:ro
      - ./apps/api/alembic.ini:/app/alembic.ini:ro
      # Mount tests so test edits land in the container without `docker cp`
      # (pytest runs here via `docker exec echoroo-backend`). Read-only is safe:
      # CPython silently skips bytecode writes on read-only dirs, and the pytest
      # cache lives under /app (writable), not /app/tests.
      - ./apps/api/tests:/app/tests:ro
      # Audio files directory (read-only)
      - ${ECHOROO_AUDIO_DIR:-/tmp/echoroo-audio}:/data/audio:ro
      # Persistent data
      - backend-data:/data
      # ML model cache (shared with worker)
      - ml-models-data:/home/appuser/.local/share/birdnet
      # Redis TLS CA (read-only) — required so the backend can verify the
      # dev Redis self-signed cert when connecting via rediss://.
      - ./config/redis/tls:/etc/redis/tls:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-echoroo}
      - REDIS_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0?ssl_ca_certs=/etc/redis/tls/ca.crt
      - REDIS_TLS_CA_FILE=/etc/redis/tls/ca.crt
      # Browser-facing host derives from ECHOROO_PUBLIC_HOST (bare
      # hostname/IP, no scheme/port; default localhost). Scheme stays http
      # in dev — production terminates TLS at a reverse proxy. Ports keep
      # using the existing ECHOROO_FRONTEND_PORT / ECHOROO_API_PORT knobs.
      - APP_URL=http://${ECHOROO_PUBLIC_HOST:-localhost}:${ECHOROO_FRONTEND_PORT:-5173}
      - DEBUG=true
      - ENVIRONMENT=development
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      # Dual-origin CORS: keep the localhost origins (SSH port-forward users
      # still arrive as localhost) AND append the public-host origin. The
      # container-internal http://frontend:5173 entry stays. When PUBLIC_HOST
      # is localhost the public entry duplicates the first one — harmless.
      - ALLOWED_ORIGINS=["http://localhost:${ECHOROO_FRONTEND_PORT:-5173}","http://localhost:3000","http://frontend:5173","http://${ECHOROO_PUBLIC_HOST:-localhost}:${ECHOROO_FRONTEND_PORT:-5173}"]
      - AUDIO_ROOT=/data/audio
      # spec/011 NFR-011-010 — invitation token signing (KID + HMAC).
      # Required at every boot (dev + staging + prod). The 32-char minimum
      # only applies in prod/staging, but we keep the default strong so the
      # same defaults work if ENVIRONMENT is flipped.
      - INVITATION_TOKEN_KID_NEW=${INVITATION_TOKEN_KID_NEW:-dev-kid-001}
      - INVITATION_TOKEN_HMAC_KEY=${INVITATION_TOKEN_HMAC_KEY:-dev-invitation-hmac-key-please-rotate-in-production-32+chars}
      - TEST_MODE=${TEST_MODE:-false}
      - TEST_TOTP_SECRET_BASE32=${TEST_TOTP_SECRET_BASE32:-}
      - S3_ENDPOINT_URL=http://localstack:4566
      # Presigned URLs are handed to the browser, so they must use the
      # public host (routed through the Vite /s3-proxy to avoid CORS).
      - S3_PUBLIC_ENDPOINT_URL=http://${ECHOROO_PUBLIC_HOST:-localhost}:${ECHOROO_FRONTEND_PORT:-5173}/s3-proxy
      - S3_ACCESS_KEY=echoroo
      - S3_SECRET_KEY=echoroo-dev
      - S3_BUCKET=echoroo
      - CELERY_BROKER_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0?ssl_ca_certs=/etc/redis/tls/ca.crt
      - CELERY_RESULT_BACKEND=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/1?ssl_ca_certs=/etc/redis/tls/ca.crt
      - XENO_CANTO_API_KEY=${XENO_CANTO_API_KEY:-}
      # AWS / KMS — LocalStack KMS backs envelope encryption (TOTP DEK),
      # PII hashing, audit chain HMAC, and invitation token signing
      # (006-permissions-redesign). LocalStack accepts any non-empty creds.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_KMS_REGION=us-east-1
      - AWS_ENDPOINT_URL_KMS=http://localstack:4566
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - echoroo-net

  # GPU worker: handles ML inference tasks (Perch, BirdNET detection/embedding/search).
  # Pre-loads models at startup to avoid per-task loading overhead.
  # Uses --max-tasks-per-child=0 so the process lives indefinitely and keeps
  # model weights resident in GPU/CPU memory.
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    command: uv run celery -A echoroo.workers.celery_app worker -l info --pool=solo -Q gpu --max-tasks-per-child=0
    # Without a restart policy the celery containers stay down after a host
    # reboot while backend/frontend (unless-stopped) come back, leaving
    # uploads/imports queued forever with no visible error.
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # CPU / Blackwell rationale: hosts whose GPU is unusable by TensorFlow
    # (e.g. NVIDIA Blackwell / RTX 50-series / sm_120) set
    # ECHOROO_ML_USE_GPU=false to force CPU inference. CPU inference can
    # grow unbounded and reboot the host, so ECHOROO_WORKER_MEM_LIMIT caps
    # this container's RAM (0 = unlimited = current GPU behaviour; set e.g.
    # 24g — ~40% of host RAM — on a CPU box). mem_limit coexists with the
    # GPU device reservation above (compose v2).
    mem_limit: ${ECHOROO_WORKER_MEM_LIMIT:-0}
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-echoroo}
      - REDIS_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0?ssl_ca_certs=/etc/redis/tls/ca.crt
      - REDIS_TLS_CA_FILE=/etc/redis/tls/ca.crt
      - CELERY_BROKER_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0?ssl_ca_certs=/etc/redis/tls/ca.crt
      - CELERY_RESULT_BACKEND=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/1?ssl_ca_certs=/etc/redis/tls/ca.crt
      - S3_ENDPOINT_URL=http://localstack:4566
      - S3_ACCESS_KEY=echoroo
      - S3_SECRET_KEY=echoroo-dev
      - S3_BUCKET=echoroo
      - AUDIO_ROOT=/data/audio
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # AWS / KMS — see backend service for rationale.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_KMS_REGION=us-east-1
      - AWS_ENDPOINT_URL_KMS=http://localstack:4566
      # Invitation token signing — mirror backend (spec/011 NFR-011-010);
      # celery_app imports echoroo settings at startup, which validates
      # the invitation kid envelope at every boot.
      - INVITATION_TOKEN_KID_NEW=${INVITATION_TOKEN_KID_NEW:-dev-kid-001}
      - INVITATION_TOKEN_HMAC_KEY=${INVITATION_TOKEN_HMAC_KEY:-dev-invitation-hmac-key-please-rotate-in-production-32+chars}
      # ML / inference. Defaults preserve the historical GPU behaviour.
      # Set ECHOROO_ML_USE_GPU=false (+ ECHOROO_WORKER_MEM_LIMIT) on a host
      # whose GPU is unusable by TensorFlow (Blackwell / sm_120) or absent.
      - ECHOROO_ML_USE_GPU=${ECHOROO_ML_USE_GPU:-true}
      - ECHOROO_ML_GPU_BATCH_SIZE=${ECHOROO_ML_GPU_BATCH_SIZE:-16}
      - ECHOROO_ML_FEEDERS=${ECHOROO_ML_FEEDERS:-1}
      - ECHOROO_ML_WORKERS=${ECHOROO_ML_WORKERS:-1}
      - ECHOROO_ML_CPU_NUM_THREADS=${ECHOROO_ML_CPU_NUM_THREADS:-8}
      # Single-dash default (`-` not `:-`): an explicitly-empty value in .env
      # passes through as empty -> "skip warmup" (the documented semantics);
      # `:-` would wrongly force it back to 1.
      - ECHOROO_ML_CPU_WARMUP_BATCHES=${ECHOROO_ML_CPU_WARMUP_BATCHES-1}
      - ECHOROO_ML_GPU_ALLOW_GROWTH=${ECHOROO_ML_GPU_ALLOW_GROWTH:-true}
    volumes:
      - ./apps/api:/app
      - backend-data:/data
      - ${ECHOROO_AUDIO_DIR:-/tmp/echoroo-audio}:/data/audio:ro
      - ml-models-data:/home/appuser/.local/share/birdnet
      - ./config/redis/tls:/etc/redis/tls:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    networks:
      - echoroo-net

  # CPU worker: handles all non-ML background tasks (uploads, imports,
  # annotations, taxon sync, classifier training, etc.).
  # No GPU reservation required.
  worker-cpu:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    command: uv run celery -A echoroo.workers.celery_app worker -l info --pool=solo -Q default -n worker-cpu@%h
    restart: unless-stopped
    # CPU / Blackwell rationale (parity with the GPU worker above): this
    # worker is CPU-only by design, so ECHOROO_WORKER_MEM_LIMIT bounds its
    # RAM too (0 = unlimited = current behaviour).
    mem_limit: ${ECHOROO_WORKER_MEM_LIMIT:-0}
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-echoroo}
      - REDIS_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0?ssl_ca_certs=/etc/redis/tls/ca.crt
      - REDIS_TLS_CA_FILE=/etc/redis/tls/ca.crt
      - CELERY_BROKER_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0?ssl_ca_certs=/etc/redis/tls/ca.crt
      - CELERY_RESULT_BACKEND=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/1?ssl_ca_certs=/etc/redis/tls/ca.crt
      - S3_ENDPOINT_URL=http://localstack:4566
      - S3_ACCESS_KEY=echoroo
      - S3_SECRET_KEY=echoroo-dev
      - S3_BUCKET=echoroo
      - AUDIO_ROOT=/data/audio
      # AWS / KMS — see backend service for rationale.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_KMS_REGION=us-east-1
      - AWS_ENDPOINT_URL_KMS=http://localstack:4566
      # Invitation token signing — mirror backend (spec/011 NFR-011-010);
      # celery_app imports echoroo settings at startup, which validates
      # the invitation kid envelope at every boot.
      - INVITATION_TOKEN_KID_NEW=${INVITATION_TOKEN_KID_NEW:-dev-kid-001}
      - INVITATION_TOKEN_HMAC_KEY=${INVITATION_TOKEN_HMAC_KEY:-dev-invitation-hmac-key-please-rotate-in-production-32+chars}
      # ML / inference (parity with GPU worker). Defaults preserve current
      # behaviour; consumed only if ML tasks ever route here.
      - ECHOROO_ML_USE_GPU=${ECHOROO_ML_USE_GPU:-true}
      - ECHOROO_ML_GPU_BATCH_SIZE=${ECHOROO_ML_GPU_BATCH_SIZE:-16}
      - ECHOROO_ML_FEEDERS=${ECHOROO_ML_FEEDERS:-1}
      - ECHOROO_ML_WORKERS=${ECHOROO_ML_WORKERS:-1}
      - ECHOROO_ML_CPU_NUM_THREADS=${ECHOROO_ML_CPU_NUM_THREADS:-8}
      # Single-dash default (`-` not `:-`): an explicitly-empty value in .env
      # passes through as empty -> "skip warmup" (the documented semantics);
      # `:-` would wrongly force it back to 1.
      - ECHOROO_ML_CPU_WARMUP_BATCHES=${ECHOROO_ML_CPU_WARMUP_BATCHES-1}
      - ECHOROO_ML_GPU_ALLOW_GROWTH=${ECHOROO_ML_GPU_ALLOW_GROWTH:-true}
    volumes:
      - ./apps/api:/app
      - backend-data:/data
      - ${ECHOROO_AUDIO_DIR:-/tmp/echoroo-audio}:/data/audio:ro
      - ml-models-data:/home/appuser/.local/share/birdnet
      - ./config/redis/tls:/etc/redis/tls:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    networks:
      - echoroo-net

  # Celery beat scheduler for periodic tasks
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    command: uv run celery -A echoroo.workers.celery_app beat -l info
    restart: unless-stopped
    environment:
      - REDIS_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0?ssl_ca_certs=/etc/redis/tls/ca.crt
      - REDIS_TLS_CA_FILE=/etc/redis/tls/ca.crt
      - CELERY_BROKER_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0?ssl_ca_certs=/etc/redis/tls/ca.crt
      - CELERY_RESULT_BACKEND=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/1?ssl_ca_certs=/etc/redis/tls/ca.crt
      # AWS / KMS — see backend service for rationale.
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_KMS_REGION=us-east-1
      - AWS_ENDPOINT_URL_KMS=http://localstack:4566
      # Invitation token signing — mirror backend (spec/011 NFR-011-010);
      # celery_app imports echoroo settings at startup, which validates
      # the invitation kid envelope at every boot.
      - INVITATION_TOKEN_KID_NEW=${INVITATION_TOKEN_KID_NEW:-dev-kid-001}
      - INVITATION_TOKEN_HMAC_KEY=${INVITATION_TOKEN_HMAC_KEY:-dev-invitation-hmac-key-please-rotate-in-production-32+chars}
    volumes:
      - ./apps/api:/app
      - ./config/redis/tls:/etc/redis/tls:ro
    depends_on:
      redis:
        condition: service_started
    networks:
      - echoroo-net

  # Frontend SvelteKit Server
  frontend:
    build:
      context: apps/web
      dockerfile: Dockerfile.dev
    container_name: echoroo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ECHOROO_FRONTEND_PORT:-5173}:5173"
    volumes:
      # Mount source for hot reload
      - ./apps/web/src:/app/src:ro
      # Paraglide-JS generates code into src/lib/paraglide at build time.
      # Override the read-only src mount with a writable anonymous volume so the
      # Vite plugin can write its output inside the container.
      - paraglide-generated:/app/src/lib/paraglide
      - ./apps/web/static:/app/static:ro
      - ./apps/web/vite.config.ts:/app/vite.config.ts:ro
      - ./apps/web/svelte.config.js:/app/svelte.config.js:ro
      - ./apps/web/tailwind.config.js:/app/tailwind.config.js:ro
      - ./apps/web/postcss.config.js:/app/postcss.config.js:ro
      - ./apps/web/tsconfig.json:/app/tsconfig.json:ro
      # Mount inlang project and message files for Paraglide compilation.
      # Must be :rw — paraglide/inlang writes its plugin cache into
      # project.inlang/cache; :ro causes EROFS on fresh installs.
      - ./apps/web/project.inlang:/app/project.inlang:rw
      - ./apps/web/messages:/app/messages:ro
    environment:
      - ECHOROO_API_URL=http://backend:8000
      # Browser-facing API base derives from ECHOROO_PUBLIC_HOST (default
      # localhost) + the existing ECHOROO_API_PORT knob.
      - PUBLIC_API_URL=http://${ECHOROO_PUBLIC_HOST:-localhost}:${ECHOROO_API_PORT:-8002}
      # Passed through so vite.config.ts can add the public host to
      # server.allowedHosts (Vite rejects non-localhost Host headers by
      # default). Empty/unset is fine — the config only appends when set.
      - ECHOROO_PUBLIC_HOST=${ECHOROO_PUBLIC_HOST:-localhost}
    networks:
      - echoroo-net

networks:
  echoroo-net:
    name: echoroo-dev

volumes:
  db-data:
    name: echoroo-dev-db
  backend-data:
    name: echoroo-dev-data
  redis-data:
    name: echoroo-dev-redis
  ml-models-data:
    name: echoroo-dev-ml-models
  paraglide-generated:
    name: echoroo-dev-paraglide
