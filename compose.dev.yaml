# Echoroo Rebuild - Development Docker Compose
# PostgreSQL + Redis + FastAPI Backend + SvelteKit Frontend
#
# Usage:
#   ./scripts/docker.sh dev        # Start development environment
#   ./scripts/docker.sh dev logs   # View logs
#   ./scripts/docker.sh dev stop   # Stop

services:
  # PostgreSQL Database with pgvector
  db:
    image: pgvector/pgvector:pg16
    container_name: echoroo-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-echoroo}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echoroo-net

  # Redis for rate limiting and caching.
  # TLS + AUTH (requirepass) + ACL enabled per NFR-007 (006-permissions-redesign).
  # Generate dev certs once via `./scripts/gen-redis-dev-cert.sh` before first start.
  redis:
    image: redis:7-alpine
    container_name: echoroo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
      - ./config/redis/users.acl:/etc/redis/users.acl:ro
      - ./config/redis/tls:/etc/redis/tls:ro
    command: ["redis-server", "/etc/redis/redis.conf"]
    healthcheck:
      # Health probe must also speak TLS + AUTH. Use the CA to verify.
      test:
        - "CMD"
        - "redis-cli"
        - "--tls"
        - "--cacert"
        - "/etc/redis/tls/ca.crt"
        - "-a"
        - "${REDIS_PASSWORD:-echoroo-dev-redis-password}"
        - "--user"
        - "${REDIS_USERNAME:-echoroo}"
        - "ping"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echoroo-net

  # LocalStack (S3-compatible object storage for development)
  localstack:
    image: localstack/localstack:latest
    container_name: echoroo-localstack
    environment:
      - SERVICES=s3
      - PERSISTENCE=1
      - EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - EXTRA_CORS_ALLOWED_HEADERS=content-type,x-amz-content-sha256,x-amz-date,authorization,x-amz-security-token,x-amz-checksum-sha256
    ports:
      - "4566:4566"
    volumes:
      - ${ECHOROO_LOCALSTACK_DATA:-./.data/localstack}:/var/lib/localstack
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
    networks:
      - echoroo-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend FastAPI Server
  backend:
    build:
      context: apps/api
      dockerfile: Dockerfile.dev
    container_name: echoroo-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    ports:
      - "${ECHOROO_API_PORT:-8002}:8000"
    volumes:
      # Mount source code for hot reload
      - ./apps/api/echoroo:/app/echoroo:ro
      - ./apps/api/alembic:/app/alembic:ro
      - ./apps/api/alembic.ini:/app/alembic.ini:ro
      # Audio files directory (read-only)
      - ${ECHOROO_AUDIO_DIR:-/tmp/echoroo-audio}:/data/audio:ro
      # Persistent data
      - backend-data:/data
      # ML model cache (shared with worker)
      - ml-models-data:/home/appuser/.local/share/birdnet
      # Redis TLS CA (read-only) — required so the backend can verify the
      # dev Redis self-signed cert when connecting via rediss://.
      - ./config/redis/tls:/etc/redis/tls:ro
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-echoroo}
      - REDIS_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0
      - REDIS_TLS_CA_FILE=/etc/redis/tls/ca.crt
      - APP_URL=http://localhost:${ECHOROO_FRONTEND_PORT:-5173}
      - DEBUG=true
      - ENVIRONMENT=development
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - ALLOWED_ORIGINS=["http://localhost:${ECHOROO_FRONTEND_PORT:-5173}","http://localhost:3000","http://frontend:5173"]
      - AUDIO_ROOT=/data/audio
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - S3_ENDPOINT_URL=http://localstack:4566
      - S3_PUBLIC_ENDPOINT_URL=http://localhost:${ECHOROO_FRONTEND_PORT:-5173}/s3-proxy
      - S3_ACCESS_KEY=echoroo
      - S3_SECRET_KEY=echoroo-dev
      - S3_BUCKET=echoroo
      - CELERY_BROKER_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0
      - CELERY_RESULT_BACKEND=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/1
      - XENO_CANTO_API_KEY=${XENO_CANTO_API_KEY:-}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - echoroo-net

  # GPU worker: handles ML inference tasks (Perch, BirdNET detection/embedding/search).
  # Pre-loads models at startup to avoid per-task loading overhead.
  # Uses --max-tasks-per-child=0 so the process lives indefinitely and keeps
  # model weights resident in GPU/CPU memory.
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    command: uv run celery -A echoroo.workers.celery_app worker -l info --pool=solo -Q gpu --max-tasks-per-child=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-echoroo}
      - REDIS_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0
      - REDIS_TLS_CA_FILE=/etc/redis/tls/ca.crt
      - CELERY_BROKER_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0
      - CELERY_RESULT_BACKEND=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/1
      - S3_ENDPOINT_URL=http://localstack:4566
      - S3_ACCESS_KEY=echoroo
      - S3_SECRET_KEY=echoroo-dev
      - S3_BUCKET=echoroo
      - AUDIO_ROOT=/data/audio
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./apps/api:/app
      - backend-data:/data
      - ${ECHOROO_AUDIO_DIR:-/tmp/echoroo-audio}:/data/audio:ro
      - ml-models-data:/home/appuser/.local/share/birdnet
      - ./config/redis/tls:/etc/redis/tls:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    networks:
      - echoroo-net

  # CPU worker: handles all non-ML background tasks (uploads, imports,
  # annotations, taxon sync, classifier training, etc.).
  # No GPU reservation required.
  worker-cpu:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    command: uv run celery -A echoroo.workers.celery_app worker -l info --pool=solo -Q default -n worker-cpu@%h
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-echoroo}
      - REDIS_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0
      - REDIS_TLS_CA_FILE=/etc/redis/tls/ca.crt
      - CELERY_BROKER_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0
      - CELERY_RESULT_BACKEND=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/1
      - S3_ENDPOINT_URL=http://localstack:4566
      - S3_ACCESS_KEY=echoroo
      - S3_SECRET_KEY=echoroo-dev
      - S3_BUCKET=echoroo
      - AUDIO_ROOT=/data/audio
    volumes:
      - ./apps/api:/app
      - backend-data:/data
      - ${ECHOROO_AUDIO_DIR:-/tmp/echoroo-audio}:/data/audio:ro
      - ml-models-data:/home/appuser/.local/share/birdnet
      - ./config/redis/tls:/etc/redis/tls:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      localstack:
        condition: service_healthy
    networks:
      - echoroo-net

  # Celery beat scheduler for periodic tasks
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    command: uv run celery -A echoroo.workers.celery_app beat -l info
    environment:
      - REDIS_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0
      - REDIS_TLS_CA_FILE=/etc/redis/tls/ca.crt
      - CELERY_BROKER_URL=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/0
      - CELERY_RESULT_BACKEND=rediss://${REDIS_USERNAME:-echoroo}:${REDIS_PASSWORD:-echoroo-dev-redis-password}@redis:6379/1
    volumes:
      - ./apps/api:/app
      - ./config/redis/tls:/etc/redis/tls:ro
    depends_on:
      redis:
        condition: service_started
    networks:
      - echoroo-net

  # Frontend SvelteKit Server
  frontend:
    build:
      context: apps/web
      dockerfile: Dockerfile.dev
    container_name: echoroo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ECHOROO_FRONTEND_PORT:-5173}:5173"
    volumes:
      # Mount source for hot reload
      - ./apps/web/src:/app/src:ro
      # Paraglide-JS generates code into src/lib/paraglide at build time.
      # Override the read-only src mount with a writable anonymous volume so the
      # Vite plugin can write its output inside the container.
      - paraglide-generated:/app/src/lib/paraglide
      - ./apps/web/static:/app/static:ro
      - ./apps/web/vite.config.ts:/app/vite.config.ts:ro
      - ./apps/web/svelte.config.js:/app/svelte.config.js:ro
      - ./apps/web/tailwind.config.js:/app/tailwind.config.js:ro
      - ./apps/web/postcss.config.js:/app/postcss.config.js:ro
      - ./apps/web/tsconfig.json:/app/tsconfig.json:ro
      # Mount inlang project and message files for Paraglide compilation
      - ./apps/web/project.inlang:/app/project.inlang:ro
      - ./apps/web/messages:/app/messages:ro
    environment:
      - ECHOROO_API_URL=http://backend:8000
      - PUBLIC_API_URL=http://localhost:${ECHOROO_API_PORT:-8002}
      - PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
    networks:
      - echoroo-net

networks:
  echoroo-net:
    name: echoroo-dev

volumes:
  db-data:
    name: echoroo-dev-db
  backend-data:
    name: echoroo-dev-data
  redis-data:
    name: echoroo-dev-redis
  ml-models-data:
    name: echoroo-dev-ml-models
  paraglide-generated:
    name: echoroo-dev-paraglide
