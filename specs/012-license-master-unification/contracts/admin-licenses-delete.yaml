openapi: 3.1.0
info:
  title: Echoroo Admin API — License DELETE (delete-protection extension)
  version: 0.1.0
  description: >
    This contract documents the new 409 Conflict response shape that
    `DELETE /api/v1/admin/licenses/{id}` AND
    `DELETE /web-api/v1/admin/licenses/{id}` return when the license
    is still referenced by at least one project or dataset. The 204
    No Content (success) and 404 Not Found (license id does not
    exist) responses are unchanged from today's behavior and are
    listed here only for completeness. Reference:
    spec/012-license-master-unification FR-006, FR-012, FR-015.

    NOTE on backend layout (verified during plan review):
      * The Bearer-authenticated programmatic surface lives in
        ``apps/api/echoroo/api/v1/admin.py`` (single aggregated
        admin module — no per-resource file).
      * The cookie-session BFF surface lives in
        ``apps/api/echoroo/api/web_v1/_admin_licenses.py`` and is
        what the SvelteKit admin UI actually calls.
      Both endpoints share the same response shape documented below;
      the implementation MUST add contract tests for BOTH paths.

paths:
  /api/v1/admin/licenses/{license_id}:
    delete:
      operationId: deleteLicense
      summary: Delete a license (refused when in use)
      description: >
        Deletes the license identified by `license_id`. The operation
        is refused with 409 Conflict if at least one project or dataset
        references the license. The error body includes both
        dependency counts so the admin UI can render an actionable
        message (FR-015 explicitly requires (a) the offending license
        identity, (b) project count, (c) dataset count, (d) next-step
        guidance).

        The defense-in-depth layering:
          1. Service-layer pre-query computes the counts and raises
             `LicenseInUseError` if either count > 0.
          2. PostgreSQL FK `ON DELETE RESTRICT` is the safety net
             against concurrent inserts that race the pre-query.
      parameters:
        - in: path
          name: license_id
          required: true
          schema:
            type: string
            maxLength: 50
          description: The `licenses.id` of the row to delete.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: License deleted successfully.
        "404":
          description: No license with that `id` exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error_code: license_not_found
                message: "License 'cc-by-nd' not found"
        "409":
          description: >
            License is still referenced by at least one project or
            dataset and cannot be deleted. The response body includes
            both dependency counts and the license's `short_name` so
            the admin UI can render an actionable refusal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseInUseError"
              example:
                error_code: license_in_use
                message: "License 'CC-BY' is still in use; reassign or remove dependents first"
                short_name: CC-BY
                project_count: 3
                dataset_count: 7

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key

  schemas:
    ErrorEnvelope:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
        message:
          type: string

    LicenseInUseError:
      allOf:
        - $ref: "#/components/schemas/ErrorEnvelope"
        - type: object
          required: [short_name, project_count, dataset_count]
          properties:
            error_code:
              type: string
              enum: [license_in_use]
            short_name:
              type: string
              maxLength: 50
              description: The `short_name` of the license being refused.
            project_count:
              type: integer
              minimum: 0
              description: >
                Count of projects still referencing the license. May
                be 0 when only datasets depend on the license; in that
                case `dataset_count` must be >= 1. At least ONE of
                `project_count` or `dataset_count` MUST be >= 1
                (otherwise the delete would have succeeded, not
                returned 409).
            dataset_count:
              type: integer
              minimum: 0
              description: >
                Count of datasets still referencing the license. May
                be 0 when only projects depend on the license; in
                that case `project_count` must be >= 1.

    NOTE_race_condition:
      type: object
      description: >
        Race condition path (no separate response schema — same 409
        envelope as above). When the service-layer pre-count returns
        0/0 but a concurrent INSERT lands a referencing row before
        the DELETE statement runs, PostgreSQL raises
        `ForeignKeyViolation` (FK ON DELETE RESTRICT). The service
        layer catches this and re-runs the dependency-count query
        BEFORE returning the 409 response, so the counts in the body
        reflect the post-race state. No sentinel value is used; the
        response is structurally identical to the normal 409 path
        (i.e. `project_count` and `dataset_count` are the
        freshly-recounted values).
