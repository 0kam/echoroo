openapi: 3.1.0
info:
  title: Echoroo Web BFF — Licenses (read-only public list)
  version: 0.1.0
  description: >
    Cookie-session-authenticated read endpoint that lists all licenses
    currently present in the master `licenses` table. Used by the
    project creation form (`/projects/new`) to populate the license
    dropdown live from admin-curated data. Reference: spec/012-license-master-unification.

paths:
  /web-api/v1/licenses:
    get:
      operationId: webListLicenses
      summary: List active licenses
      description: >
        Returns every row in the `licenses` master table, ordered by
        `short_name` ascending. Status 200 is returned even when the
        master is empty (the response is an empty `items` list); the
        frontend renders an actionable empty state in that case.

        FR-001 — master is the source of truth.
        FR-002 — live-fetched per form open.
        FR-016 — must add no user-perceivable latency to the form
        (target: < 200 ms p95 on top of the form's existing budget).
        FR-017 — requires only that the caller be an authenticated
        user permitted to create a project (i.e. any authenticated
        user; not gated to admins).
      security:
        - cookieSession: []
      responses:
        "200":
          description: License list (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseListResponse"
        "401":
          description: Caller is not authenticated. Returned by the
            web-api auth router when the session cookie or access token
            is missing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: echoroo_session
      description: >
        Web BFF session cookie set by `/web-api/v1/auth/login`. Must
        be present alongside an `Authorization: Bearer <accessToken>`
        header (the access token lives in memory in the frontend
        `ApiClient` and is refreshed via `/web-api/v1/auth/refresh`).

  schemas:
    LicenseListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/License"

    License:
      type: object
      required: [id, short_name, name]
      properties:
        id:
          type: string
          maxLength: 50
          description: >
            Stable identifier (e.g. `cc-by`). Survives admin-side
            renames of `short_name` and `name`.
        short_name:
          type: string
          maxLength: 50
          description: >
            Display label shown in dropdowns and detail screens (e.g.
            `CC-BY`). Unique across the master.
        name:
          type: string
          maxLength: 200
          description: >
            Full human-readable name (e.g. "Creative Commons
            Attribution 4.0 International"). Shown in tooltips and
            detail pages.
        url:
          type: string
          nullable: true
          maxLength: 500
          format: uri
          description: Canonical URL to the license text.
        description:
          type: string
          nullable: true
          description: Optional admin-authored note.

    ErrorEnvelope:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
          example: auth_required
        message:
          type: string
          example: Access token required
