openapi: 3.1.0
info:
  title: Echoroo Account API (DSR + soft-delete)
  version: "1.0.0"
  description: >
    Self-service GDPR endpoints for the authenticated user (FR-105 / FR-109).

    * ``POST /web-api/v1/account/dsr/export`` — synchronous JSON export of all
      first-party rows the caller can own (FR-109).
    * ``POST /web-api/v1/account/dsr/delete`` — soft-delete the caller's
      ``users`` row by anonymising email + display_name + 2FA state and
      stamping ``deleted_at`` (FR-105). Owned ``project_members`` /
      ``annotation_votes`` rows are NOT cascaded — they keep
      ``user_id`` for statistical integrity, but the linked PII is
      anonymised at the source row.

    Both endpoints share the cookie-based session transport already
    enforced by the production middleware chain
    (``CsrfMiddleware`` + ``AuthRouterMiddleware``); no separate
    bearer-token surface exists.

    Companion automation (out of OpenAPI scope, captured here for
    cross-reference):
      * ``echoroo.workers.invitation_email_null`` — daily Celery beat
        sweep that nulls ``project_invitations.email`` 30 days after
        accept / decline / expire (FR-106). The HMAC ``email_hash`` is
        retained so audit replay still works.
      * ``echoroo.workers.trusted_email_null`` — daily Celery beat
        sweep that nulls ``project_trusted_users.email_at_invitation``
        90 days after revoke or expiry (FR-108). The HMAC
        ``email_at_invitation_hash`` is retained.

servers:
  - url: https://echoroo.app/web-api/v1
    description: Production
  - url: http://localhost:8002/web-api/v1
    description: Local dev

paths:
  /account/dsr/export:
    post:
      summary: Export the caller's own data (GDPR DSR, FR-109)
      operationId: dsrExport
      tags: [account]
      security:
        - sessionCookie: []
      description: >
        Returns a JSON document containing every first-party row that
        carries the caller's ``user_id`` or ``email_hash``. The
        ``platform_audit_log`` / ``project_audit_log`` rows are
        intentionally excluded — those tables only persist hashed
        actor identifiers (FR-091a / FR-091b) so they cannot be
        re-personalised even by their subject.

        Rate limit: the contract reserves a 429 response for the
        planned 1 successful export per user per 24 hours quota; the
        current implementation does NOT yet enforce that cap (the
        Redis-backed limiter lands as a post-launch ratchet). When
        the limiter is wired up the response body will carry a
        ``retry_after`` seconds field. Clients SHOULD treat 429 as
        retryable irrespective of when the limiter activates.
      responses:
        "200":
          description: Export succeeded; the body is the full DSR payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DsrExportResponse'
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "429":
          description: Rate limit exceeded (1/day).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /account/dsr/delete:
    post:
      summary: Soft-delete the caller's account (GDPR right to erasure, FR-105)
      operationId: dsrDelete
      tags: [account]
      security:
        - sessionCookie: []
      description: >
        Anonymises the ``users`` row in place:

        * ``email`` is replaced with the sentinel
          ``deleted_<32-hex>@deleted.echoroo.invalid`` (the user's
          full UUID hex, 16^32 ≈ 3.4e38 collision budget) so the
          UNIQUE constraint stays satisfied.
        * ``display_name`` is replaced with the sentinel
          ``"[deleted user]"``.
        * ``password_hash`` is replaced with a fixed sentinel value
          and ``security_stamp`` is rotated, immediately invalidating
          every existing session and refresh-token family.
        * ``two_factor_secret_encrypted`` /
          ``two_factor_backup_codes_hashed`` are NULLed so the
          recovery flow cannot resurrect the dormant account.
        * ``deleted_at`` is stamped with ``now()``.

        The ``users.id`` PK is preserved so downstream rows
        (``project_members``, ``annotation_votes``,
        ``project_audit_log.actor_user_id_hash``,
        ``project_invitations.invited_by_id``) keep referential
        integrity. A ``platform_audit_log`` row is written from a
        fresh session AFTER the main TX commits (FR-093 SERIALIZABLE
        gate) so the ``user.self_delete`` action survives even if the
        chain write later fails (soft-alert FR-088).

        The endpoint is idempotent: a second call by an
        already-deleted caller returns 401 because the auth middleware
        rejects the session as soon as ``deleted_at`` is set.
      responses:
        "200":
          description: Account anonymisation succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DsrDeleteResponse'
          headers:
            Set-Cookie:
              description: >
                The endpoint clears every session-related cookie issued
                by the auth router so the browser stops replaying
                stale credentials. The four cookies are:
                ``echoroo_session`` (session JWT,
                ``Path=/web-api/v1/``), ``echoroo_refresh`` (refresh
                token, ``Path=/web-api/v1/auth/refresh``),
                ``echoroo_csrf`` (CSRF token, ``Path=/``) and
                ``echoroo_logged_in`` (SvelteKit hooks marker,
                ``Path=/``). All four are emitted with ``Max-Age=0``
                and the same ``HttpOnly`` / ``Secure`` /
                ``SameSite=Strict`` attributes the issuer used —
                attribute drift would create sibling cookies instead
                of evicting them. See
                ``echoroo.api.web_v1.auth._clear_session_cookies`` for
                the canonical attribute set.
              schema:
                type: string
                example: "echoroo_session=; Path=/web-api/v1/; HttpOnly; Secure; SameSite=Strict; Max-Age=0"
        "401":
          description: Not authenticated (or already deleted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /account/trusted-devices:
    get:
      summary: List trusted devices for the current user
      operationId: listTrustedDevices
      tags: [account-security]
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Trusted devices visible to the current user.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [devices]
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrustedDeviceSummary'
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /account/trusted-devices/{id}:
    delete:
      summary: Revoke one trusted device
      operationId: revokeTrustedDevice
      tags: [account-security]
      security:
        - sessionCookie: []
          csrfToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Device revoked or already unavailable to this user.
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: CSRF or authorization failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /account/trusted-devices/revoke-all:
    post:
      summary: Revoke all trusted devices for the current user
      operationId: revokeAllTrustedDevices
      tags: [account-security]
      security:
        - sessionCookie: []
          csrfToken: []
      responses:
        "204":
          description: All active trusted devices revoked.
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: CSRF or authorization failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: echoroo_session
      description: >
        Session JWT issued by ``POST /web-api/v1/auth/login``
        (settings ``web_session_cookie_name``). Both DSR endpoints
        also accept the matching ``echoroo_csrf`` token via the
        production CSRF middleware.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF token required for state-changing first-party account operations.

  schemas:
    Error:
      type: object
      required: [error_code, message]
      properties:
        error_code:
          type: string
        message:
          type: string
        request_id:
          type: string
        retry_after:
          type: integer
          nullable: true

    DsrExportResponse:
      type: object
      required:
        - generated_at
        - user
        - project_memberships
        - project_invitations
        - trusted_user_overlays
        - annotation_votes
      properties:
        generated_at:
          type: string
          format: date-time
          description: UTC timestamp at which the export was assembled.
        user:
          $ref: '#/components/schemas/DsrUser'
        project_memberships:
          type: array
          items:
            $ref: '#/components/schemas/DsrProjectMembership'
        project_invitations:
          type: array
          description: >
            Invitation history matched on ``email_hash`` (FR-055). The
            plain-text ``email`` may be NULL for older rows once the
            ``invitation_email_null`` worker has run.
          items:
            $ref: '#/components/schemas/DsrProjectInvitation'
        trusted_user_overlays:
          type: array
          description: >
            Trusted-user overlay history. ``email_at_invitation`` may
            be NULL once the ``trusted_email_null`` worker has run
            (FR-108).
          items:
            $ref: '#/components/schemas/DsrTrustedOverlay'
        annotation_votes:
          type: array
          description: >
            Vote rows keyed on ``voter_user_id`` (FR-037). Rows linked
            to deleted projects keep ``project_id`` for the export so
            the user can correlate the vote with the original site;
            the project itself is not exposed beyond its UUID.
          items:
            $ref: '#/components/schemas/DsrAnnotationVote'

    DsrUser:
      type: object
      required: [id, email, display_name, two_factor_enabled, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        two_factor_enabled:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        last_first_party_activity_at:
          type: string
          format: date-time
          nullable: true
        registered_timezone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    DsrProjectMembership:
      type: object
      required: [project_id, role, joined_at]
      properties:
        project_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, admin, member, viewer]
        joined_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        removed_at:
          type: string
          format: date-time
          nullable: true

    DsrProjectInvitation:
      type: object
      required: [id, project_id, kind, status, expires_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [member, trusted]
        role:
          type: string
          enum: [owner, admin, member, viewer]
          nullable: true
        status:
          type: string
          enum: [pending, accepted, declined, revoked, expired]
        email:
          type: string
          format: email
          nullable: true
          description: NULL once the invitation_email_null worker ran (FR-106).
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        declined_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    DsrTrustedOverlay:
      type: object
      required: [id, project_id, status, granted_at, expires_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, expired, revoked]
        granted_permissions:
          type: array
          items:
            type: string
        granted_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        email_at_invitation:
          type: string
          format: email
          nullable: true
          description: NULL once the trusted_email_null worker ran (FR-108).

    DsrAnnotationVote:
      type: object
      required: [id, annotation_id, project_id, vote, source, created_at]
      properties:
        id:
          type: string
          format: uuid
        annotation_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        vote:
          type: integer
          enum: [-1, 0, 1]
        source:
          type: string
          enum: [member, guest_authenticated, trusted_user]
        project_role_at_vote:
          type: string
          enum: [owner, admin, member, viewer]
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DsrDeleteResponse:
      type: object
      required: [user_id, deleted_at]
      properties:
        user_id:
          type: string
          format: uuid
        deleted_at:
          type: string
          format: date-time

    TrustedDeviceSummary:
      type: object
      required: [id, label, created_at, last_used_at, expires_at, current_device]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
        current_device:
          type: boolean
        last_seen_hint:
          type: string
          nullable: true
          description: Audit-safe display hint, never raw IP or full User-Agent.
