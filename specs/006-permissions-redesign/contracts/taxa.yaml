openapi: 3.1.0
info:
  title: Echoroo Taxa API
  version: "1.0.0"
  description: >
    Global taxa search and GBIF lookup. The same read-only shapes are exposed
    on the programmatic API (`/api/v1/`) and first-party session API
    (`/web-api/v1/`).

servers:
  - url: https://echoroo.app/api/v1
    description: Programmatic API (Bearer API key required, cookies rejected)
  - url: https://echoroo.app/web-api/v1
    description: First-party session API (session cookie required, API keys rejected)

security:
  - apiKeyAuth: []
  - sessionCookie: []

paths:
  /taxa/search:
    get:
      summary: Search local taxa
      operationId: searchTaxa
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - name: locale
          in: query
          required: false
          schema: { type: string, nullable: true }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Matching local taxa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaxonSearchResult'
        "401":
          description: Authentication required

  /taxa/gbif-search:
    get:
      summary: Search GBIF Backbone Taxonomy
      operationId: searchGbifTaxa
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Matching GBIF species
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GBIFSpeciesResult'
        "401":
          description: Authentication required

components:
  securitySchemes:
    apiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: "echoroo_{prefix}_{secret}"
      description: Programmatic API key for `/api/v1/*`.
    sessionCookie:
      type: apiKey
      in: cookie
      name: echoroo_session
      description: First-party session cookie for `/web-api/v1/*`.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: Required only for first-party state-changing requests.

  schemas:
    TaxonSearchResult:
      type: object
      required:
        - id
        - scientific_name
        - gbif_taxon_key
        - rank
        - is_non_biological
        - common_name
      properties:
        id: { type: string, format: uuid }
        scientific_name: { type: string }
        gbif_taxon_key: { type: integer, nullable: true }
        rank: { type: string, nullable: true }
        is_non_biological: { type: boolean }
        common_name: { type: string, nullable: true }

    GBIFSpeciesResult:
      type: object
      required:
        - gbif_key
        - scientific_name
        - canonical_name
      properties:
        gbif_key: { type: integer }
        scientific_name: { type: string }
        canonical_name: { type: string }
        rank: { type: string, nullable: true }
        vernacular_name: { type: string, nullable: true }
        vernacular_names:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties:
              type: string
        kingdom: { type: string, nullable: true }
        phylum: { type: string, nullable: true }
        class_name: { type: string, nullable: true }
        order: { type: string, nullable: true }
        family: { type: string, nullable: true }
