openapi: 3.1.0
info:
  title: Echoroo Detections API
  version: "1.0.0"
  description: >
    Detection 一覧 / 詳細 / エクスポート / 投票 / コメント。
    全エンドポイントで check_project_access + Response filter 必須（spec 指摘の漏れを塞ぐ）。
    生 lat/lng はレスポンスに含まれない（FR-028〜031）。

servers:
  - url: https://echoroo.app/api/v1
    description: Programmatic API（Bearer API key 必須）
  - url: https://echoroo.app/web-api/v1
    description: First-party session API（Cookie + CSRF）

# file-level security: read-only default (apiKeyAuth OR sessionCookie)
# state-changing (投票・コメント等) は path operation で apiKeyAuth or (sessionCookie + csrfToken) に override
security:
  - apiKeyAuth: []
  - sessionCookie: []

paths:
  /projects/{id}/detections:
    get:
      summary: Detection list（Permission gate + Response filter 通過）
      description: |
        - Visibility + Restricted toggle に応じて VIEW_DETECTION を判定
        - 各 detection の h3_index は compute_effective_resolution で解像度調整
        - mask_species_in_detection=true なら species を "(masked)" に置換
        - location_generalization / withheld_reason 列を必ず返す（FR-086）
      operationId: listDetections
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: species
          in: query
          schema: { type: string }
        - name: site_id
          in: query
          schema: { type: string, format: uuid }
        - name: start_time
          in: query
          schema: { type: string, format: date-time }
        - name: end_time
          in: query
          schema: { type: string, format: date-time }
        - name: min_confidence
          in: query
          schema: { type: number }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200":
          description: Detection list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionListResponse'
        "403":
          description: VIEW_DETECTION なし（Restricted で allow_detection_view=OFF など）

  /projects/{id}/detections/{detectionId}:
    get:
      summary: Detection 詳細
      operationId: getDetection
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: detectionId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 詳細（Response filter 適用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detection'

  /projects/{id}/detections/export/csv:
    get:
      summary: CSV エクスポート（EXPORT permission 必須）
      description: |
        CSV ヘッダに以下が必ず含まれる（FR-086）:
        - license
        - license_history_url
        - location_generalization (H3 resolution)
        - withheld_reason
        生 lat/lng は含まれない
      operationId: exportDetectionsCsv
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - $ref: '#/components/parameters/SpeciesFilter'
      responses:
        "200":
          description: CSV stream
          content:
            text/csv:
              schema: { type: string }

  /projects/{id}/detections/export/ml-dataset:
    post:
      summary: ML dataset エクスポート（EXPORT permission、非同期 Celery）
      description: ZIP 作成は Celery task、署名付き S3 URL が完成メールで送られる
      operationId: exportMlDataset
      security:
        - apiKeyAuth: []
        - sessionCookie: []
          csrfToken: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "202":
          description: ジョブ登録完了、job_id を返す

  /projects/{id}/annotations/{annotationId}/votes:
    get:
      summary: 投票サマリ（per-source 集計 + 個票、非メンバー/Trusted 個票 user_id は Owner/Admin のみ）
      operationId: listAnnotationVotes
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: annotationId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 集計 + 可視個票
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteSummaryResponse'
        "404":
          description: annotation が project に属さない（BOLA guard）

    post:
      summary: 投票（VOTE permission）
      description: |
        - source は member / guest_authenticated / trusted_user を自動判定（FR-037、初回 snapshot は immutable）
        - 同一ユーザーの再投票は既存票を置換し、status を再計算して更新後サマリを返す
      operationId: createAnnotationVote
      security:
        - apiKeyAuth: []
        - sessionCookie: []
          csrfToken: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: annotationId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteCastRequest'
      responses:
        "200":
          description: 更新後の投票サマリ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteSummaryResponse'
        "404":
          description: annotation が project に属さない（BOLA guard）

    delete:
      summary: 自分の投票を削除（mutating vote action — VOTE permission を共有、FR-037）
      operationId: deleteAnnotationVote
      security:
        - apiKeyAuth: []
        - sessionCookie: []
          csrfToken: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: annotationId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 削除後の投票サマリ（status 再計算済み）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteSummaryResponse'
        "404":
          description: annotation が project に属さない、または削除対象の票が無い

  # Detection-scoped alias of the annotation vote surface
  # (apps/api/echoroo/api/v1/detections.py — same gates, same VoteSummaryResponse).
  /projects/{id}/detections/{detectionId}/votes:
    get:
      summary: Detection 投票サマリ（annotation votes と同一契約）
      operationId: listDetectionVotes
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: detectionId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 集計 + 可視個票
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteSummaryResponse'
        "404":
          description: detection が project に属さない（BOLA guard）

    post:
      summary: Detection への投票（VOTE permission、再投票は置換）
      operationId: createDetectionVote
      security:
        - apiKeyAuth: []
        - sessionCookie: []
          csrfToken: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: detectionId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteCastRequest'
      responses:
        "200":
          description: 更新後の投票サマリ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteSummaryResponse'
        "404":
          description: detection が project に属さない（BOLA guard）

    delete:
      summary: Detection への自分の投票を削除（VOTE permission を共有）
      operationId: deleteDetectionVote
      security:
        - apiKeyAuth: []
        - sessionCookie: []
          csrfToken: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: detectionId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 削除後の投票サマリ（status 再計算済み）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoteSummaryResponse'
        "404":
          description: detection が project に属さない、または削除対象の票が無い

  /projects/{id}/annotations/{annotationId}/comments:
    get:
      summary: コメント一覧（source バッジ付き）
      operationId: listAnnotationComments
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: annotationId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: コメント list

    post:
      summary: コメント投稿（COMMENT permission）
      operationId: createAnnotationComment
      security:
        - apiKeyAuth: []
        - sessionCookie: []
          csrfToken: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: annotationId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              additionalProperties: false
              properties:
                body: { type: string, maxLength: 2000 }
      responses:
        "201":
          description: コメント登録

components:
  securitySchemes:
    apiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: "ek_live_{prefix}_{secret}"
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_id
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token

  parameters:
    SpeciesFilter:
      name: species
      in: query
      schema: { type: string }

  schemas:
    DetectionListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Detection' }
        total: { type: integer }
        page: { type: integer }

    Detection:
      type: object
      properties:
        id: { type: string, format: uuid }
        recording_id: { type: string, format: uuid }
        species: { type: string, description: "mask_species_in_detection=true の場合 '(masked)'" }
        start_time: { type: number, description: "秒単位" }
        end_time: { type: number }
        confidence: { type: number }
        h3_index: { type: string, description: "compute_effective_resolution の結果（動的、生 lat/lng は含まれない）" }
        location_generalization: { type: integer, description: "適用された H3 resolution（FR-086）" }
        withheld_reason:
          type: string
          enum: [none, project_toggle, taxon_sensitivity, hidden]
          description: 粗化理由

    # ----- Vote schemas (mirror apps/api/echoroo/schemas/annotation_vote.py) -----
    VoteCastRequest:
      type: object
      required: [vote]
      properties:
        vote: { type: string, enum: [agree, disagree, unsure] }
        signal_quality:
          type: string
          enum: [solo, dominant, mixed]
          nullable: true
          description: vote=agree のときのみ有効な音質評価
        suggested_tag_id:
          type: string
          format: uuid
          nullable: true
          description: disagree 時に提案する正しい種 tag
        note: { type: string, maxLength: 2000, nullable: true }

    VoteUserInfo:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        display_name: { type: string, nullable: true }

    VoteResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        annotation_id: { type: string, format: uuid }
        user_id:
          type: string
          format: uuid
          nullable: true
          description: 非メンバー / Trusted 票の user_id は Owner / Admin 以外には null にマスク（投票自体は可視）（FR-039）
        vote: { type: string, enum: [agree, disagree, unsure] }
        signal_quality: { type: string, enum: [solo, dominant, mixed], nullable: true }
        suggested_tag_id: { type: string, format: uuid, nullable: true }
        note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        user:
          allOf: [{ $ref: '#/components/schemas/VoteUserInfo' }]
          nullable: true
          description: user_id がマスクされる場合は省略（null）
        source: { type: string, enum: [member, guest_authenticated, trusted_user], description: "投票時の関係 snapshot（FR-037、immutable）" }
        project_role_at_vote:
          type: string
          enum: [viewer, member, admin]
          nullable: true
          description: 投票時の project role snapshot（source!=member は null）

    VoteSummaryResponse:
      type: object
      properties:
        annotation_id: { type: string, format: uuid }
        agree_count: { type: integer }
        disagree_count: { type: integer }
        unsure_count: { type: integer }
        user_vote: { type: string, enum: [agree, disagree, unsure], nullable: true }
        user_signal_quality: { type: string, enum: [solo, dominant, mixed], nullable: true }
        signal_quality_counts:
          type: object
          additionalProperties: { type: integer }
          description: agree 票の signal_quality 内訳（solo/dominant/mixed）
        consensus_status: { type: string, enum: [unreviewed, confirmed, rejected] }
        voters:
          type: array
          description: 個票 list。非メンバー / Trusted 票の user_id マスクは VoteResponse 参照（FR-038 / FR-039）
          items: { $ref: '#/components/schemas/VoteResponse' }
        # FR-038: per-source aggregate counts（3-source breakdown）
        member_agree: { type: integer }
        member_disagree: { type: integer }
        guest_authenticated_agree: { type: integer }
        guest_authenticated_disagree: { type: integer }
        trusted_user_agree: { type: integer }
        trusted_user_disagree: { type: integer }
