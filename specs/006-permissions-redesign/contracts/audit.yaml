openapi: 3.1.0
info:
  title: Echoroo Audit Log API
  version: "1.0.0"
  description: >
    AuditLog 閲覧。project_audit_log と platform_audit_log に分離（FR-088〜096）。
    PII は keyed hash（FR-091）、閲覧行為自体もメタログ記録（FR-096）。

servers:
  - url: https://echoroo.app/web-api/v1
    description: First-party session API のみ（audit log 閲覧は Web UI 限定）

security:
  - sessionCookie: []       # project audit log (Owner/Admin)
  - superuserSession: []    # platform audit log / chain-verify (superuser)

paths:
  /projects/{id}/audit-log:
    get:
      summary: Project audit log 閲覧（VIEW_AUDIT_LOG = Owner/Admin、FR-088）
      operationId: listProjectAuditLog
      security:
        - sessionCookie: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: action
          in: query
          schema: { type: string }
          description: "e.g. 'member_added', 'toggle_changed', 'license_changed'"
        - name: actor_user_id_hash
          in: query
          schema: { type: string }
          description: "特定ユーザーの行動追跡（hash 経由、pii_hash_key は KMS GenerateMac で計算済みのもの）"
        - name: before
          in: query
          schema: { type: string, format: date-time }
        - name: after
          in: query
          schema: { type: string, format: date-time }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
      responses:
        "200":
          description: Audit log 一覧（PII は hash のみ）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'

  /admin/audit-log:
    get:
      summary: Platform audit log 閲覧（superuser のみ、FR-089）
      security:
        - superuserSession: []
      description: |
        ログイン / 2FA チャレンジ / API key 発行 / superuser 操作など。
        このエンドポイント自身へのアクセスもメタログ記録（FR-096）
      operationId: listPlatformAuditLog
      parameters:
        - name: action
          in: query
          schema: { type: string }
        - name: actor_user_id_hash
          in: query
          schema: { type: string }
        - name: request_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Platform audit log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'

  /admin/audit-log/chain-verify:
    post:
      summary: Chain integrity verify（superuser、週次バッチと手動実行両方）
      security:
        - superuserSession: []
          csrfToken: []
      description: |
        hash chain の prev_hash / row_hash が一致するか全行検証。
        genesis row から累積計算、差異があれば詳細レポート
      operationId: verifyAuditChain
      parameters:
        - name: target
          in: query
          schema: { type: string, enum: [project, platform] }
          required: true
      responses:
        "200":
          description: 検証結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_valid: { type: boolean }
                  verified_row_count: { type: integer }
                  first_mismatch_row_id: { type: string, nullable: true }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_id
      description: Owner/Admin が自プロジェクトの project_audit_log を閲覧するとき使用
    superuserSession:
      type: apiKey
      in: cookie
      name: session_id
      description: |
        superuser が platform_audit_log を閲覧するとき使用。
        WebAuthn hardware key + IP allowlist 検証済みセッション（FR-111）。

  schemas:
    AuditLogResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuditLogEntry' }
        total: { type: integer }
        page: { type: integer }

    AuditLogEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        actor_user_id_hash: { type: string, description: "HMAC-SHA256 with pii_hash_key" }
        project_id: { type: string, format: uuid, nullable: true }
        action: { type: string }
        detail: { type: object, description: "sanitized JSONB、PII は {hash, hash_version, redacted:true} 形式" }
        request_id: { type: string }
        ip_hash: { type: string }
        user_agent_hash: { type: string }
        before: { type: object, nullable: true }
        after: { type: object, nullable: true }
        prev_hash: { type: string }
        row_hash: { type: string }
