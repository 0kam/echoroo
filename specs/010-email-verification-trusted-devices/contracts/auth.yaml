openapi: 3.1.0
info:
  title: Echoroo Auth API Delta — Email Verification and Trusted Devices
  version: "1.0.0"
  description: >
    Contract deltas for spec/010. These paths are browser-facing and live under
    /web-api/v1/auth. Implementation should reconcile these deltas with the
    canonical auth contracts used by the repository's OpenAPI diff tests.

servers:
  - url: https://echoroo.app/web-api/v1
    description: Production BFF
  - url: http://localhost:8002/web-api/v1
    description: Local dev BFF

paths:
  /auth/register:
    post:
      summary: Register user and enqueue email verification
      operationId: register
      responses:
        "201":
          description: Account created without session; verification email queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"

  /auth/verify-email:
    post:
      summary: Verify account email with a single-use token
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyEmailResponse"
        "400":
          description: Invalid, expired, consumed, superseded, or wrong-purpose token

  /auth/verify-email/resend:
    post:
      summary: Resend verification email for the current user or normalized email
      operationId: resendVerificationEmail
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationEmailRequest"
      responses:
        "202":
          description: Request accepted; anti-enumeration response does not reveal account existence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "429":
          description: Resend rate limit exceeded

  /auth/login:
    post:
      summary: Password login, optionally completed by valid trusted device
      operationId: login
      responses:
        "200":
          description: Password accepted; response is either complete session or next 2FA state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/2fa/challenge:
    post:
      summary: Complete 2FA and optionally trust this device
      operationId: verify2FA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorChallengeRequest"
      responses:
        "200":
          description: 2FA verified; session issued and trusted-device cookie may be set
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "echoroo_trusted_device=...; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=2592000"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorChallengeResponse"

  /auth/2fa/setup/totp/confirm:
    post:
      summary: Confirm first-login TOTP setup and optionally trust this device
      operationId: confirmTotp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpSetupConfirmRequest"
      responses:
        "200":
          description: TOTP enabled; session issued and trusted-device cookie may be set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpSetupConfirmResponse"

components:
  schemas:
    RegisterResponse:
      type: object
      additionalProperties: false
      required: [user_id, email, email_verified_at, email_verification_required, two_factor_setup_required]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        email_verification_required:
          type: boolean
        two_factor_setup_required:
          type: boolean

    VerifyEmailRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          pattern: "^[A-Za-z0-9_-]{43}$"

    VerifyEmailResponse:
      type: object
      additionalProperties: false
      required: [email_verified_at]
      properties:
        email_verified_at:
          type: string
          format: date-time

    ResendVerificationEmailRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          description: Optional for pre-session resend; authenticated resend uses current user.

    MessageResponse:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string

    LoginResponse:
      oneOf:
        - $ref: "#/components/schemas/LoginCompleteResponse"
        - $ref: "#/components/schemas/LoginInterimResponse"
      discriminator:
        propertyName: login_state
        mapping:
          complete: "#/components/schemas/LoginCompleteResponse"
          2fa_setup_required: "#/components/schemas/LoginInterimResponse"
          2fa_required: "#/components/schemas/LoginInterimResponse"

    LoginCompleteResponse:
      type: object
      additionalProperties: false
      required: [login_state, access_token, expires_in]
      properties:
        login_state:
          type: string
          const: complete
        access_token:
          type: string
        expires_in:
          type: integer
        trusted_device_used:
          type: boolean

    LoginInterimResponse:
      type: object
      additionalProperties: false
      required: [login_state, interim_token]
      properties:
        login_state:
          type: string
          enum: [2fa_setup_required, 2fa_required]
        interim_token:
          type: string

    TwoFactorChallengeRequest:
      type: object
      additionalProperties: false
      required: [interim_token, method, code]
      properties:
        interim_token:
          type: string
        method:
          type: string
          enum: [totp, backup_code]
        code:
          type: string
        trust_device:
          type: boolean
          default: false
        device_label:
          type: string
          maxLength: 100
          description: NFKC-normalized label; control characters rejected; UI must HTML-escape on display.

    TwoFactorChallengeResponse:
      type: object
      additionalProperties: false
      required: [access_token, expires_in]
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
        trusted_device_created:
          type: boolean

    TotpSetupConfirmRequest:
      type: object
      additionalProperties: false
      required: [interim_token, secret, totp_code]
      properties:
        interim_token:
          type: string
        secret:
          type: string
        totp_code:
          type: string
          pattern: "^[0-9]{6}$"
        trust_device:
          type: boolean
          default: false
        device_label:
          type: string
          maxLength: 100
          description: NFKC-normalized label; control characters rejected; UI must HTML-escape on display.

    TotpSetupConfirmResponse:
      type: object
      additionalProperties: false
      required: [backup_codes, access_token, expires_in]
      properties:
        backup_codes:
          type: array
          items:
            type: string
        access_token:
          type: string
        expires_in:
          type: integer
        trusted_device_created:
          type: boolean
