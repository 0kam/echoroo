openapi: 3.0.3
info:
  title: Echoroo Zero-email Deployment — Project Create (plain owner-is-creator)
  version: "0.2.0"
  description: |
    Project-creation endpoint contract for the Web UI BFF surface.

    AMENDMENT (2026-06-03, preview feedback #1/#2): the create-time system
    superuser bootstrap (`intended_owner_email` request field +
    `invitation_url` / `invitation_id` response fields, formerly
    FR-011-120..125) has been REMOVED. The creator always becomes the
    project owner. Ownership transfer is now a post-creation operation —
    the owner uses `POST /web-api/v1/projects/{project_id}/transfer-ownership`
    to hand the project to an existing Admin member (no contract change to
    that endpoint, which is user_id-based and already exists). Adding a
    user to a project is invitation-only (the direct member-add route was
    removed); issue a Member-kind invitation instead.

    The filename / stem is retained so the OpenAPI-diff harness inventory
    stays stable; the contract now documents the plain create response.

paths:
  /web-api/v1/projects:
    post:
      summary: Create a project (creator becomes owner)
      operationId: createProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, visibility, license_id]
              properties:
                name: { type: string, maxLength: 200 }
                visibility:
                  type: string
                  enum: [public, restricted]
                license_id:
                  type: string
                  description: Project data license id (licenses.id primary key).
                # ... other existing fields ...
      responses:
        "201":
          description: |
            Project created, owned by the authenticated creator. The
            response is the plain project resource (no bootstrap-invitation
            fields). `Cache-Control: no-store` is always set on this
            endpoint.
          headers:
            Cache-Control:
              schema:
                type: string
                enum: ["no-store, no-cache, must-revalidate, private"]
              description: |
                Cache-Control no-store is ALWAYS set on this endpoint so a
                cached 201 cannot replay project metadata through a shared
                proxy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "422": { description: Validation failure }
      security:
        - sessionCookie: []
      x-permission: PROJECT_CREATE  # (existing)

components:
  schemas:
    # Minimal shape stub for the live ``ProjectCreateResponse`` Pydantic
    # model, which (after the 2026-06-03 amendment) is a plain subclass of
    # ``ProjectResponse`` with no extra fields. The full surface is owned
    # by ``specs/006-permissions-redesign/contracts/projects.yaml``; the
    # harness validates path / method / requestBody / response-code rather
    # than every field name.
    ProjectResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        visibility: { type: string, enum: [public, restricted] }
        license: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: echoroo_session
