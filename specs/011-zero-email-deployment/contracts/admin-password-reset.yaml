openapi: 3.0.3
info:
  title: Echoroo Zero-email Deployment — Admin Password Reset + Forced Change + Step-up
  version: "0.1.0"
  description: |
    HTTP contracts for system-superuser-mediated password reset (FR-011-201..210),
    the forced-change flow (FR-011-204..205), and the step-up auth primitive
    (FR-011-206). Step-up extends the existing services/step_up_token_service.py
    and middleware/step_up.py — not a new module (Rev.3).

paths:
  /web-api/v1/auth/step-up/begin:
    post:
      summary: Initiate a step-up auth challenge
      operationId: beginStepUp
      tags: [step-up]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scope]
              properties:
                scope:
                  type: string
                  enum: [admin_recovery]
                  description: |
                    Spec/011 admin-recovery flow scope. Mints a step-up JWT with
                    scope="admin_recovery" (distinct from the existing
                    "admin_destructive" scope used by spec/006 endpoints).
      responses:
        "200":
          description: Challenge issued. Frontend presents password + 2FA prompts.
          content:
            application/json:
              schema:
                type: object
                required: [challenge_id, factors_required]
                properties:
                  challenge_id: { type: string }
                  factors_required:
                    type: array
                    items: { type: string, enum: [password, totp, webauthn] }
                    example: [password, totp]
      security:
        - sessionCookie: []
      x-allowlist: authenticated-self
      x-no-gate-action: true

  /web-api/v1/auth/step-up/complete:
    post:
      summary: Complete a step-up auth challenge and obtain a token
      operationId: completeStepUp
      tags: [step-up]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challenge_id, factors]
              properties:
                challenge_id: { type: string }
                factors:
                  oneOf:
                    - type: object
                      required: [password, totp_code]
                      properties:
                        password: { type: string }
                        totp_code:
                          type: string
                          minLength: 6
                          maxLength: 6
                    - type: object
                      required: [password, webauthn_assertion]
                      properties:
                        password: { type: string }
                        webauthn_assertion:
                          type: object
                          description: Standard WebAuthn assertion payload.
      responses:
        "200":
          description: |
            Step-up JWT issued (5-minute TTL, HS256 signed via web_session_secret).
            Token is opaque to the client and MUST be sent on subsequent
            admin-recovery requests via X-Step-Up-Token.

            **Server-side invariant (security review M-1)**: the issuing handler MUST
            verify the supplied `password` against the user's stored password hash
            (argon2 / bcrypt) BEFORE encoding `factors.password = true` into the JWT
            payload. The client cannot spoof this field — the JWT signature
            (HS256 with `web_session_secret`) covers the entire payload including
            `factors`. The handler MUST similarly verify `totp_code` against the
            user's enrolled TOTP secret, or `webauthn_assertion` against the user's
            registered credential, before setting `factors.second_factor`. Failure
            of either verification returns 401.
          content:
            application/json:
              schema:
                type: object
                required: [step_up_token, expires_at, scope_set]
                properties:
                  step_up_token:
                    type: string
                    description: |
                      Opaque; held in-memory by the frontend ONLY (never persisted).
                      Telemetry / access logs MUST scrub this field.
                  expires_at: { type: string, format: date-time }
                  scope_set:
                    type: array
                    items: { type: string }
        "401":
          description: Authentication failed (wrong password / wrong second factor).
        "423":
          description: Account currently in forced-change (must_change_password=true).
      security:
        - sessionCookie: []

  /web-api/v1/admin/users/{user_id}/reset-password:
    post:
      summary: Reset a target user's password (system superuser only)
      operationId: adminResetUserPassword
      tags: [admin-recovery]
      parameters:
        - in: path
          name: user_id
          required: true
          schema: { type: string, format: uuid }
        - in: header
          name: X-Step-Up-Token
          required: true
          description: |
            Step-up JWT with `scope = "admin_recovery"` and `factors = {password: true, second_factor: "totp" | "webauthn"}`.
            Issued by POST /web-api/v1/auth/step-up/complete. The verifier middleware
            (apps/api/echoroo/middleware/step_up.py extended for spec/011) refuses
            tokens whose scope is `admin_destructive` (spec/006 path), and tokens
            whose factors do not satisfy the AND condition.
            Server-side note: the issuance handler MUST verify the password in
            `factors.password=true` against the user's stored hash (security
            review M-1); the client is NOT trusted to set this flag.
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                  description: Free-form; A-13 PII detector applies.
      responses:
        "200":
          description: |
            Reset complete. Response carries the one-time temporary password.
            Side effects: target user's other sessions invalidated, trusted-device
            records revoked, must_change_password=true, temp_password_expires_at=now+24h.
          headers:
            Cache-Control:
              schema: { type: string, enum: ["no-store, no-cache, must-revalidate, private"] }
            Referrer-Policy:
              schema: { type: string, enum: ["no-referrer"] }
          content:
            application/json:
              schema:
                type: object
                required: [temporary_password, expires_at]
                properties:
                  temporary_password:
                    type: string
                    description: |
                      One-shot value. MUST be scrubbed from telemetry / access logs.
                      Frontend renders behind click-to-reveal; copies to clipboard with
                      60s auto-clear.
                  expires_at: { type: string, format: date-time }
        "401":
          description: Step-up token missing, invalid, expired, or wrong scope.
        "403":
          description: Caller is not the system superuser.
        "404":
          description: Target user not found.
      security:
        - sessionCookie: []
      x-permission: ADMIN_USER_RESET_PASSWORD_ACTION

  /web-api/v1/auth/change-password:
    post:
      summary: Change own password (allowed during forced-change)
      operationId: changePassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  description: |
                    Accepts the active password OR the most-recent admin-issued
                    temporary password (during the 24h temp_password TTL).
                new_password:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: |
            Password changed. must_change_password cleared. All other sessions
            invalidated. Trusted-device records revoked.
        "400":
          description: New password fails policy.
        "401":
          description: Current password / temp password mismatch.
      security:
        - sessionCookie: []
      x-allowlist: forced-password-change-middleware
      x-csrf-required: true

  /api/v1/auth/change-password:
    post:
      summary: Change own password (v1 mirror of /web-api/v1/auth/change-password)
      operationId: changePasswordV1
      tags: [auth]
      requestBody:
        $ref: "#/paths/~1web-api~1v1~1auth~1change-password/post/requestBody"
      responses:
        "200": { description: OK }
        "400": { description: Validation }
        "401": { description: Unauthorized }
      security:
        - sessionCookie: []
      x-allowlist: forced-password-change-middleware
      x-csrf-required: true

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: echoroo_session
