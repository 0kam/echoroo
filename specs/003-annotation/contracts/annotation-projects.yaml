openapi: 3.0.3
info:
  title: Echoroo Annotation - Annotation Projects API
  version: 1.0.0

paths:
  /api/v1/projects/{project_id}/annotation-projects:
    get:
      summary: List annotation projects
      operationId: listAnnotationProjects
      tags: [annotation-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Annotation project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationProjectListResponse'

    post:
      summary: Create an annotation project
      operationId: createAnnotationProject
      tags: [annotation-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationProjectCreate'
      responses:
        '201':
          description: Annotation project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationProjectDetailResponse'

  /api/v1/projects/{project_id}/annotation-projects/{annotation_project_id}:
    get:
      summary: Get annotation project details
      operationId: getAnnotationProject
      tags: [annotation-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/AnnotationProjectId'
      responses:
        '200':
          description: Annotation project details with progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationProjectDetailResponse'

    patch:
      summary: Update an annotation project
      operationId: updateAnnotationProject
      tags: [annotation-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/AnnotationProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationProjectUpdate'
      responses:
        '200':
          description: Annotation project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationProjectDetailResponse'

    delete:
      summary: Delete an annotation project
      operationId: deleteAnnotationProject
      tags: [annotation-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/AnnotationProjectId'
      responses:
        '204':
          description: Annotation project deleted

  /api/v1/projects/{project_id}/annotation-projects/{annotation_project_id}/generate-tasks:
    post:
      summary: Generate annotation tasks from associated dataset clips
      operationId: generateAnnotationTasks
      tags: [annotation-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/AnnotationProjectId'
      responses:
        '202':
          description: Task generation started (Celery background task)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskGenerationResponse'

  /api/v1/projects/{project_id}/annotation-projects/{annotation_project_id}/export:
    get:
      summary: Export annotations
      operationId: exportAnnotations
      tags: [annotation-projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/AnnotationProjectId'
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [json, csv, aoef]
        - name: review_status
          in: query
          schema:
            type: string
            enum: [unreviewed, approved, rejected]
      responses:
        '200':
          description: Export file download
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string

components:
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AnnotationProjectId:
      name: annotation_project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    AnnotationProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        instructions:
          type: string
        visibility:
          type: string
          enum: [private, public]
          default: private
        dataset_ids:
          type: array
          items:
            type: string
            format: uuid
        tag_ids:
          type: array
          items:
            type: string
            format: uuid

    AnnotationProjectUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        instructions:
          type: string
        visibility:
          type: string
          enum: [private, public]
        dataset_ids:
          type: array
          items:
            type: string
            format: uuid
        tag_ids:
          type: array
          items:
            type: string
            format: uuid

    AnnotationProjectResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        created_by_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        instructions:
          type: string
        visibility:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AnnotationProjectDetailResponse:
      allOf:
        - $ref: '#/components/schemas/AnnotationProjectResponse'
        - type: object
          properties:
            datasets:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
            tags:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  category:
                    type: string
            progress:
              $ref: '#/components/schemas/AnnotationProgress'

    AnnotationProgress:
      type: object
      properties:
        total_tasks:
          type: integer
        completed_tasks:
          type: integer
        in_progress_tasks:
          type: integer
        pending_tasks:
          type: integer
        review_pending_tasks:
          type: integer

    AnnotationProjectListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AnnotationProjectDetailResponse'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        pages:
          type: integer

    TaskGenerationResponse:
      type: object
      properties:
        task_id:
          type: string
          description: Celery task ID for progress tracking
        message:
          type: string
