openapi: 3.0.3
info:
  title: Echoroo Annotation — Evaluation API
  version: 2.0.0
  description: |
    Cross-model evaluation runs and per-model / per-species results using the
    symmetric-overlap metric defined in research.md §4.

    Dispatching a run lives on the annotation-sets contract
    (`POST /annotation-sets/{id}/evaluate`). This contract covers reading runs
    and results.

paths:
  /api/v1/annotation-sets/{id}/evaluation-runs:
    get:
      summary: List evaluation runs for a set (most recent first)
      operationId: listEvaluationRuns
      tags: [evaluation]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: model_kind
          in: query
          schema: { $ref: '#/components/schemas/ModelKind' }
      responses:
        '200':
          description: Runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/EvaluationRunSummary' }

  /api/v1/evaluation-runs/{id}:
    get:
      summary: Get an evaluation run with all results
      operationId: getEvaluationRun
      tags: [evaluation]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationRunDetail'

components:
  schemas:
    ModelKind:
      type: string
      enum: [birdnet, perch, custom]

    EvaluationRunStatus:
      type: string
      enum: [pending, running, completed, failed]

    EvaluationRunSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        annotation_set_id: { type: string, format: uuid }
        model_kind: { $ref: '#/components/schemas/ModelKind' }
        model_ref: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/EvaluationRunStatus' }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        overall_precision: { type: number, nullable: true }
        overall_recall: { type: number, nullable: true }
        overall_f1: { type: number, nullable: true }

    EvaluationResult:
      type: object
      properties:
        species_id:
          type: string
          format: uuid
          nullable: true
          description: null = overall aggregate
        species_scientific_name: { type: string, nullable: true }
        species_common_name: { type: string, nullable: true }
        tp_precision: { type: integer }
        fp: { type: integer }
        tp_recall: { type: integer }
        fn: { type: integer }
        precision: { type: number }
        recall: { type: number }
        f1: { type: number }
        detections_total: { type: integer }
        ground_truths_total: { type: integer }

    EvaluationRunDetail:
      allOf:
        - $ref: '#/components/schemas/EvaluationRunSummary'
        - type: object
          properties:
            error: { type: string, nullable: true }
            results:
              type: array
              items: { $ref: '#/components/schemas/EvaluationResult' }
