openapi: 3.0.3
info:
  title: Echoroo Annotation — TimeRangeAnnotation API
  version: 2.0.0
  description: |
    CRUD for individual TimeRangeAnnotation rows. Creation is handled by
    `POST /segments/{id}/annotations` in the segments contract; this file
    covers update, delete, and annotation-level notes.

paths:
  /api/v1/annotations/{id}:
    patch:
      summary: Update a TimeRangeAnnotation
      operationId: updateTimeRangeAnnotation
      tags: [annotations]
      parameters:
        - $ref: '#/components/parameters/AnnotationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeRangeAnnotationUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeRangeAnnotationResponse'

    delete:
      summary: Delete a TimeRangeAnnotation (may flip parent segment.is_empty)
      operationId: deleteTimeRangeAnnotation
      tags: [annotations]
      parameters:
        - $ref: '#/components/parameters/AnnotationId'
      responses:
        '204':
          description: Deleted

  /api/v1/annotations/{id}/notes:
    post:
      summary: Attach a note to a TimeRangeAnnotation
      operationId: createAnnotationNote
      tags: [annotations, notes]
      parameters:
        - $ref: '#/components/parameters/AnnotationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'

components:
  parameters:
    AnnotationId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  schemas:
    TimeRangeAnnotationUpdate:
      type: object
      properties:
        start_time_sec: { type: number, minimum: 0 }
        end_time_sec: { type: number, minimum: 0 }
        species_id: { type: string, format: uuid }
        confidence: { type: number, minimum: 0, maximum: 1, nullable: true }

    TimeRangeAnnotationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        segment_id: { type: string, format: uuid }
        start_time_sec: { type: number }
        end_time_sec: { type: number }
        species_id: { type: string, format: uuid }
        species_scientific_name: { type: string }
        species_common_name: { type: string, nullable: true }
        confidence: { type: number, nullable: true }
        created_by_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NoteCreate:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 5000 }
        is_issue: { type: boolean, default: false }

    NoteResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        content: { type: string }
        is_issue: { type: boolean }
        created_by_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
