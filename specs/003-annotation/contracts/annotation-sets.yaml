openapi: 3.0.3
info:
  title: Echoroo Annotation — Annotation Sets API
  version: 2.0.0
  description: |
    AnnotationSet is the top-level ground-truth container. It is parameterized by
    a source dataset, optional date / time-of-day filters, and a segment geometry
    (segment_length_sec, num_segments). Sampling, palette management, and
    cross-model evaluation all hang off the set.

paths:
  /api/v1/annotation-sets:
    get:
      summary: List annotation sets
      operationId: listAnnotationSets
      tags: [annotation-sets]
      parameters:
        - name: project_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: dataset_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/AnnotationSetStatus' }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSetListResponse'

    post:
      summary: Create an annotation set
      operationId: createAnnotationSet
      tags: [annotation-sets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationSetCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSetDetailResponse'

  /api/v1/annotation-sets/{id}:
    get:
      summary: Get annotation set detail
      operationId: getAnnotationSet
      tags: [annotation-sets]
      parameters:
        - $ref: '#/components/parameters/SetId'
      responses:
        '200':
          description: Detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSetDetailResponse'

    patch:
      summary: Update annotation set metadata (name only after `ready`)
      operationId: updateAnnotationSet
      tags: [annotation-sets]
      parameters:
        - $ref: '#/components/parameters/SetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationSetUpdate'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSetDetailResponse'

    delete:
      summary: Delete an annotation set (cascades)
      operationId: deleteAnnotationSet
      tags: [annotation-sets]
      parameters:
        - $ref: '#/components/parameters/SetId'
      responses:
        '204':
          description: Deleted

  /api/v1/annotation-sets/{id}/sample:
    post:
      summary: Dispatch the sampling job (Celery)
      operationId: sampleAnnotationSet
      tags: [annotation-sets]
      parameters:
        - $ref: '#/components/parameters/SetId'
      responses:
        '202':
          description: Sampling dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    description: Celery task id
                  status:
                    $ref: '#/components/schemas/AnnotationSetStatus'

  /api/v1/annotation-sets/{id}/segments:
    get:
      summary: List segments in a set
      operationId: listAnnotationSetSegments
      tags: [annotation-sets]
      parameters:
        - $ref: '#/components/parameters/SetId'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/SegmentStatus' }
        - name: is_empty
          in: query
          schema: { type: boolean }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
      responses:
        '200':
          description: Paginated segment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentListResponse'

  /api/v1/annotation-sets/{id}/palette:
    post:
      summary: Add a species to the palette
      operationId: addPaletteSpecies
      tags: [annotation-sets, palette]
      parameters:
        - $ref: '#/components/parameters/SetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [species_id]
              properties:
                species_id: { type: string, format: uuid }
                position: { type: integer, minimum: 0 }
      responses:
        '201':
          description: Added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaletteEntry'

  /api/v1/annotation-sets/{id}/palette/{species_id}:
    delete:
      summary: Remove a species from the palette (keeps existing annotations)
      operationId: removePaletteSpecies
      tags: [annotation-sets, palette]
      parameters:
        - $ref: '#/components/parameters/SetId'
        - name: species_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Removed

  /api/v1/annotation-sets/{id}/evaluate:
    post:
      summary: Start cross-model evaluation
      operationId: evaluateAnnotationSet
      tags: [annotation-sets, evaluation]
      parameters:
        - $ref: '#/components/parameters/SetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model_ids]
              properties:
                model_ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  description: |
                    Either a builtin kind (`birdnet`, `perch`) or a Custom model UUID.
                    Custom UUIDs are resolved against the classifier registry.
      responses:
        '202':
          description: Evaluation dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_ids:
                    type: array
                    items: { type: string, format: uuid }

components:
  parameters:
    SetId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  schemas:
    AnnotationSetStatus:
      type: string
      enum: [sampling, ready, in_progress, completed]

    SegmentStatus:
      type: string
      enum: [unannotated, annotated, skipped]

    DateRange:
      type: object
      required: [start, end]
      properties:
        start: { type: string, format: date }
        end: { type: string, format: date }

    TimeOfDayRange:
      type: object
      required: [start, end]
      properties:
        start: { type: string, pattern: '^\d{2}:\d{2}$' }
        end:   { type: string, pattern: '^\d{2}:\d{2}$' }

    AnnotationSetCreate:
      type: object
      required: [project_id, dataset_id, name, segment_length_sec, num_segments]
      properties:
        project_id: { type: string, format: uuid }
        dataset_id: { type: string, format: uuid }
        name: { type: string, maxLength: 200 }
        filter_date_range:
          $ref: '#/components/schemas/DateRange'
        filter_time_of_day_range:
          $ref: '#/components/schemas/TimeOfDayRange'
        segment_length_sec:
          type: integer
          minimum: 10
        num_segments:
          type: integer
          minimum: 1

    AnnotationSetUpdate:
      type: object
      properties:
        name: { type: string, maxLength: 200 }

    PaletteEntry:
      type: object
      properties:
        species_id: { type: string, format: uuid }
        scientific_name: { type: string }
        common_name: { type: string, nullable: true }
        position: { type: integer }

    AnnotationSetResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        dataset_id: { type: string, format: uuid }
        created_by_id: { type: string, format: uuid }
        name: { type: string }
        filter_date_range:
          allOf:
            - $ref: '#/components/schemas/DateRange'
          nullable: true
        filter_time_of_day_range:
          allOf:
            - $ref: '#/components/schemas/TimeOfDayRange'
          nullable: true
        segment_length_sec: { type: integer }
        num_segments: { type: integer }
        status: { $ref: '#/components/schemas/AnnotationSetStatus' }
        sampling_warning: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AnnotationSetDetailResponse:
      allOf:
        - $ref: '#/components/schemas/AnnotationSetResponse'
        - type: object
          properties:
            palette:
              type: array
              items: { $ref: '#/components/schemas/PaletteEntry' }
            progress:
              type: object
              properties:
                total: { type: integer }
                unannotated: { type: integer }
                annotated: { type: integer }
                skipped: { type: integer }
                empty: { type: integer }

    AnnotationSetListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AnnotationSetResponse' }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }

    SegmentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              recording_id: { type: string, format: uuid }
              recording_filename: { type: string }
              start_time_sec: { type: number }
              end_time_sec: { type: number }
              is_empty: { type: boolean }
              status: { $ref: '#/components/schemas/SegmentStatus' }
              annotated_by_id: { type: string, format: uuid, nullable: true }
              annotated_at: { type: string, format: date-time, nullable: true }
              annotation_count: { type: integer }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
