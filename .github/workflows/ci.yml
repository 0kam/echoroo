name: CI (006-permissions-redesign)

# This workflow adds the 006-permissions-redesign specific CI gates on top of
# the existing `test.yml` workflow. It introduces five categories of jobs:
#
#   1. Permission / response / search / raw-coordinates / KMS isolation lint
#      scripts (T100a-T100d). These run in **warn mode** during the
#      Foundational Phase 2 → Phase 3 migration and will be promoted to
#      blocking by the `permissions-strict-gate` job below.
#   2. OpenAPI raw-coordinate leak assertion (T100e). The job dumps the
#      FastAPI app's OpenAPI document and recursively checks that no
#      schema, parameter, or example references raw lat/lng/coordinates
#      keys. Phase 2 also runs this in warn mode while the Recording /
#      Site / Detection schemas are being migrated to `h3_index` only.
#   3. Strict permissions gate (T100f). This is the gate that controls
#      transition into Phase 3 — it runs every Phase-2 lint with the
#      strict flag plus the endpoint-coverage reflection test. It is
#      intentionally NOT triggered on every push: gating PRs while
#      Phase 3 work is in flight would keep CI red. Trigger via:
#         a) `workflow_dispatch` (manual run from the Actions UI), OR
#         b) attaching the `permissions-strict-gate` label to a PR.
#      Once Phase 3 lands, change the `if:` guard to always-on by
#      removing the workflow_dispatch / label restriction. The job MUST
#      remain `continue-on-error: false` so a green run is a real
#      green-light to start Phase 3+ work (tasks.md §2.9 checkpoint).
#   4. Mutation testing via `mutmut` against the 4 permission-critical
#      modules. Phase 2 runs this in warn-only mode; T995 promotes it
#      to a hard gate that requires >= 80% mutation score.
#   5. Dedicated security pytest job (-m security marker), always
#      blocking.
#
# Security note: no `github.event.*` untrusted inputs are interpolated into
# `run:` shell commands. Event-data references appear only inside `if:`
# expressions and `env:` blocks, never directly inside `run:` strings,
# so this workflow is not susceptible to script injection.

on:
  push:
    branches: ["main", "006-permissions-redesign"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # T100a-T100d: permission / response / search / raw-coordinate / KMS
  # isolation lints in warn mode. Each lint exits 0 unless its strict flag is
  # set, so step-level continue-on-error is belt-and-suspenders.
  # ---------------------------------------------------------------------------
  permissions-lint-warn:
    name: Permissions lint (warn mode, T100a-T100d)
    runs-on: ubuntu-latest
    # Job-level continue-on-error so the overall status is not red while
    # warn-mode is in effect (`permissions-strict-gate` flips this to a
    # blocking job when invoked).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      # T100a - every path operation must go through the Permission guard
      # (is_allowed / Depends(check_action())).
      - name: Lint - permission guard coverage (T100a)
        continue-on-error: true
        run: python scripts/lint_permission_guard.py

      # T100b - every Recording / Detection / Site response must pass through
      # the ResponseFilter sanitizer.
      - name: Lint - response filter coverage (T100b)
        continue-on-error: true
        run: python scripts/lint_response_filter.py

      # T100c - every Detection search must go through the SearchGate
      # abstraction; direct `select(Detection)` in API code is forbidden.
      - name: Lint - search gate coverage (T100c)
        continue-on-error: true
        run: python scripts/lint_search_gate.py

      # T100d (1/2) - migrations / ORM / Pydantic must not introduce raw
      # lat/lng/gps_* columns or fields (FR-028f, FR-091b).
      - name: Lint - no raw coordinates (T100d)
        continue-on-error: true
        run: python scripts/lint_no_raw_coordinates.py

      # T100d (2/2) - the 4 KMS CMK aliases must remain isolated; no code
      # path may reuse a single alias across distinct purposes (SC-019).
      # NOTE: lint_kms_isolation.py is strict-by-default; pass --no-fail
      # explicitly so the warn-mode job does not flip the step red.
      - name: Lint - KMS alias isolation (T100d)
        continue-on-error: true
        run: python scripts/lint_kms_isolation.py --no-fail

  # ---------------------------------------------------------------------------
  # T100e: OpenAPI raw-coordinate leak assertion.
  #
  # We dump the live FastAPI app's OpenAPI document inside CI, then run the
  # recursive denylist check (scripts/assert_openapi_no_coords.py) plus a
  # belt-and-suspenders `grep` for the raw quoted keys. Phase 2 runs this
  # in warn mode (job-level continue-on-error); the strict gate runs the
  # exact same assertion with continue-on-error disabled.
  # ---------------------------------------------------------------------------
  permissions-openapi-assert:
    name: Permissions OpenAPI leak check (warn mode, T100e)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # The FastAPI app instantiates at module import; provide minimal env
      # so importing echoroo.main does not crash on settings validation.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      RESEND_API_KEY: re_ci_dummy
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Generate OpenAPI document
        continue-on-error: true
        working-directory: apps/api
        run: uv run python ../../scripts/dump_openapi.py --out openapi.json

      - name: Assert no raw coordinates leak (recursive)
        continue-on-error: true
        run: |
          if [ ! -f apps/api/openapi.json ]; then
            echo "::warning::OpenAPI dump unavailable; skipping assertion"
            exit 0
          fi
          python scripts/assert_openapi_no_coords.py apps/api/openapi.json

      - name: Belt-and-suspenders grep for quoted lat/lng keys
        continue-on-error: true
        run: |
          if [ ! -f apps/api/openapi.json ]; then
            echo "::warning::OpenAPI dump unavailable; skipping grep"
            exit 0
          fi
          # Any hit prints a warning and fails the step (job-level
          # continue-on-error keeps CI green during Phase 2).
          if grep -E '"(lat|lng|latitude|longitude|coordinates|geo_point)"' \
              apps/api/openapi.json; then
            echo "::warning::raw coordinate keys leaked into openapi.json"
            exit 1
          fi
          echo "openapi.json: no raw coordinate keys found"

  # ---------------------------------------------------------------------------
  # T100f: STRICT gate — every Phase-2 lint with --fail-on-violation +
  # the endpoint-coverage reflection test. This is the merge-gate that
  # signals Phase 3+ work may begin.
  #
  # Phase 2.10 #7 (2026-04-25): the gate is now ALWAYS-ON. Each lint's
  # legacy violations are baselined into per-script allowlist files
  # under `scripts/allowlists/*.txt` so that a green run remains
  # reachable on this branch while Phase 3 work is in flight. Phase 3
  # MUST drive each allowlist to empty before final cleanup; new
  # violations introduced after the baseline date will fail the gate.
  # ---------------------------------------------------------------------------
  permissions-strict-gate:
    name: Permissions strict gate (T100f, Phase 3 entry condition)
    runs-on: ubuntu-latest
    # Intentionally NOT continue-on-error: a green run here is the
    # checkpoint to start Phase 3 work.
    continue-on-error: false
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      RESEND_API_KEY: re_ci_dummy
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Lint - permission guard coverage (strict)
        run: python scripts/lint_permission_guard.py --fail-on-violation

      - name: Lint - response filter coverage (strict)
        run: python scripts/lint_response_filter.py --fail-on-violation

      - name: Lint - search gate coverage (strict)
        run: python scripts/lint_search_gate.py --fail-on-violation

      - name: Lint - no raw coordinates (strict)
        run: python scripts/lint_no_raw_coordinates.py --fail-on-violation

      - name: Lint - KMS alias isolation (strict, default behaviour)
        run: python scripts/lint_kms_isolation.py

      - name: Generate OpenAPI document
        working-directory: apps/api
        run: uv run python ../../scripts/dump_openapi.py --out openapi.json

      - name: Assert no raw coordinates leak (strict)
        run: python scripts/assert_openapi_no_coords.py apps/api/openapi.json

      - name: Endpoint coverage reflection test
        working-directory: apps/api
        run: uv run pytest tests/security/authorization/test_endpoint_coverage.py -q

  # ---------------------------------------------------------------------------
  # Phase 2 foundation completion marker.
  #
  # This job depends on `permissions-strict-gate` so a green run signals
  # "Phase 2 done, Phase 3 may begin". Phase 2.10 #7 (2026-04-25)
  # promoted this marker from warn-only to a hard gate (continue-on-error
  # removed) now that the strict gate is reachable green via baseline
  # allowlists.
  # ---------------------------------------------------------------------------
  phase-2-foundation-complete:
    name: Phase 2 foundation complete (marker)
    needs: [permissions-strict-gate]
    if: always()
    runs-on: ubuntu-latest
    env:
      # Pull the upstream job result into an env var instead of
      # interpolating directly into the run: command, per the project's
      # Actions security guidance (no untrusted-context expansion in
      # shell strings, even though `needs.*.result` is workflow-internal).
      STRICT_GATE_RESULT: ${{ needs.permissions-strict-gate.result }}
    steps:
      - name: Report
        run: |
          echo "permissions-strict-gate result: $STRICT_GATE_RESULT"
          if [ "$STRICT_GATE_RESULT" = "success" ]; then
            echo "Phase 2 foundation gate GREEN — Phase 3+ may proceed."
          else
            echo "::warning::Phase 2 foundation gate not yet green (status: $STRICT_GATE_RESULT)"
          fi

  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # T995 (Phase 16 Batch 6h-1): Mutation testing — HARD GATE.
  #
  # Promoted from warn-only (continue-on-error: true) to blocking
  # (continue-on-error removed) by T995. The 80% threshold is enforced
  # by scripts/check_mutation_score.py against all 11 target modules
  # listed in apps/api/mutmut.toml.
  #
  # Scope (11 modules):
  #   Required:  core/permissions.py, core/actions.py,
  #              services/superuser_service.py, services/api_key_verification.py
  #   Additional: middleware/auth.py, middleware/auth_router.py,
  #               services/webauthn_service.py, workers/dormancy_check.py
  #   Existing:  core/response_filter.py, core/audit.py, core/kms.py
  #
  # Run trigger: main branch or `run-mutation-testing` PR label.
  # Mutation runs are long (minutes to hours for 11 modules); keeping the
  # label-gate prevents default PR latency from blowing up.
  #
  # Phase 17 note: modules that cannot reach 80% in this phase are tracked
  # in scripts/check_mutation_score.py --warn-only invocations during local
  # development. CI enforces the full 80% gate here.
  # ---------------------------------------------------------------------------
  mutation-testing:
    name: Mutation testing (hard gate, T995, >= 80%)
    if: >-
      github.ref == 'refs/heads/main' ||
      contains(github.event.pull_request.labels.*.name, 'run-mutation-testing')
    runs-on: ubuntu-latest
    # T995: continue-on-error REMOVED — this is now a hard-fail gate.
    # A job failure means one or more modules have mutation score < 80%.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      # Run mutmut against all 11 modules defined in mutmut.toml.
      # Exit code 0 = all mutants killed or no mutants; 1 = survivors
      # exist (expected when coverage is < 100%). The score check step
      # below is the authoritative gate — mutmut itself is allowed to
      # exit non-zero here.
      - name: Run mutmut (11 modules, hard gate)
        working-directory: apps/api
        run: uv run mutmut run || true

      # Collect results for the score check and for CI artifact upload.
      - name: Collect mutmut results
        if: always()
        working-directory: apps/api
        run: uv run mutmut results 2>&1 | tee /tmp/mutmut_results.txt || true

      # Enforce >= 80% threshold per module.
      # scripts/check_mutation_score.py parses `mutmut results` output and
      # exits 1 if any module is below 80%. This is the gate step.
      - name: Enforce 80% mutation score threshold
        if: always()
        working-directory: apps/api
        run: python ../../scripts/check_mutation_score.py --threshold 80

      # Upload mutmut cache as an artifact for debugging surviving mutants.
      - name: Upload mutmut results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-results
          path: |
            apps/api/.mutmut-cache
            /tmp/mutmut_results.txt
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Dedicated security pytest job - always blocking.
  # Runs only tests tagged with the `security` pytest marker. The marker is
  # used by the security-focused negative tests under
  # `apps/api/tests/security/`.
  # ---------------------------------------------------------------------------
  security-tests:
    name: security-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Run pytest -m security
        working-directory: apps/api
        # Codex Minor 3 (Phase 16 6g-2 R2): explicitly deselect the
        # ``performance`` marker. The ``security`` selector already implies
        # "not performance" because no test carries both markers, but the
        # redundant deselect documents the intent and protects against
        # accidental cross-tagging.
        run: uv run pytest -m "security and not performance" --maxfail=1 -q

  # ---------------------------------------------------------------------------
  # Phase 16 Batch 6g-2 R2 (Codex Minor 3): default backend pytest job that
  # explicitly **deselects** the ``performance`` and ``slow`` markers. The
  # ``performance`` tests measure latency / p95 budgets and are environment-
  # sensitive (GitHub-hosted runners flap), and ``slow`` tests cost too much
  # to run on every push. Both are opt-in only — run locally via
  # ``pytest -m performance`` with ``RUN_PERF_LATENCY=true`` for the latency
  # gate.
  #
  # This job is informational while the test suite stabilises (some legacy
  # fixtures still need the postgres testcontainer), so it runs in
  # ``continue-on-error`` mode. Promote to a hard gate once Phase 16
  # implementation reports green locally.
  # ---------------------------------------------------------------------------
  # Phase 16 Batch 6g-2 R2 (Codex Minor 3): default backend pytest job that
  # explicitly **deselects** the ``performance`` and ``slow`` markers. The
  # ``performance`` tests measure latency / p95 budgets and are environment-
  # sensitive (GitHub-hosted runners flap), and ``slow`` tests cost too much
  # to run on every push. Both are opt-in only — run locally via
  # ``pytest -m performance`` with ``RUN_PERF_LATENCY=true`` for the latency
  # gate.
  #
  # T996 (Phase 16 Batch 6h-2): coverage gate added. pytest-cov produces
  # coverage.json; scripts/check_coverage_threshold.py enforces:
  #   - permission-critical modules: >= 95%
  #   - all other echoroo modules:   >= 85%
  # The coverage gate runs AFTER the test step (always, even on test failure)
  # so that coverage data is always emitted as a CI artifact. The gate step
  # itself is hard-fail (no continue-on-error) once coverage reports are
  # stable; see the continue-on-error note on the job level.
  # ---------------------------------------------------------------------------
  backend-tests:
    name: backend-tests (default; performance + slow deselected)
    runs-on: ubuntu-latest
    # T996 note: job-level continue-on-error remains true while test suite
    # stabilises on GitHub-hosted runners (some legacy fixtures still need the
    # postgres testcontainer). Promote to false (hard gate) once Phase 16
    # reports green on CI. The per-step coverage gate inherits this setting.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      # T996: emit coverage.json + XML + term-missing alongside the standard
      # test run. The coverage reports are uploaded as artifacts even on
      # failure so that the threshold script can still run.
      - name: Run pytest with coverage (-m "not performance and not slow")
        working-directory: apps/api
        # The marker description in pyproject.toml documents this default
        # skip; do not change one without the other.
        run: |
          uv run pytest \
            -m "not performance and not slow" \
            --maxfail=1 -q \
            --cov=echoroo \
            --cov-report=json \
            --cov-report=xml \
            --cov-report=term-missing

      # Upload coverage reports as CI artifact for inspection / trend tracking.
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api/coverage.json
            apps/api/coverage.xml
          retention-days: 14

      # T996: enforce per-module thresholds.
      #   permission modules: 95%   other modules: 85%
      # Exit 1 if any module is below its threshold.
      # The script also prints the full per-module table for CI log visibility.
      - name: Enforce coverage thresholds (T996, 95%/85%)
        if: always()
        working-directory: apps/api
        run: python ../../scripts/check_coverage_threshold.py coverage.json
