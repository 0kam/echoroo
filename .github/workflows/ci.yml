name: CI (006-permissions-redesign)

# This workflow adds the 006-permissions-redesign specific CI gates on top of
# the existing `test.yml` workflow. It introduces five categories of jobs:
#
#   1. Permission / response / search / raw-coordinates / KMS isolation lint
#      scripts (T100a-T100d). These run in **warn mode** during the
#      Foundational Phase 2 → Phase 3 migration and will be promoted to
#      blocking by the `permissions-strict-gate` job below.
#   2. OpenAPI raw-coordinate leak assertion (T100e). The job dumps the
#      FastAPI app's OpenAPI document and recursively checks that no
#      schema, parameter, or example references raw lat/lng/coordinates
#      keys. Phase 2 also runs this in warn mode while the Recording /
#      Site / Detection schemas are being migrated to `h3_index` only.
#   3. Strict permissions gate (T100f). This is the gate that controls
#      transition into Phase 3 — it runs every Phase-2 lint with the
#      strict flag plus the endpoint-coverage reflection test. It is
#      intentionally NOT triggered on every push: gating PRs while
#      Phase 3 work is in flight would keep CI red. Trigger via:
#         a) `workflow_dispatch` (manual run from the Actions UI), OR
#         b) attaching the `permissions-strict-gate` label to a PR.
#      Once Phase 3 lands, change the `if:` guard to always-on by
#      removing the workflow_dispatch / label restriction. The job MUST
#      remain `continue-on-error: false` so a green run is a real
#      green-light to start Phase 3+ work (tasks.md §2.9 checkpoint).
#   4. Mutation testing via `mutmut` against 10 scorable permission-critical
#      modules (T995). Phase 17 §D-1-bis closure (PR #60) removed the
#      transitional warn-ratchet: this is now a hard gate requiring >= 80%
#      mutation score per module.
#   5. Dedicated security pytest job (-m security marker), always
#      blocking.
#
# Security note: no `github.event.*` untrusted inputs are interpolated into
# `run:` shell commands. Event-data references appear only inside `if:`
# expressions and `env:` blocks, never directly inside `run:` strings,
# so this workflow is not susceptible to script injection.

on:
  push:
    branches: ["main", "006-permissions-redesign"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Phase 17 §C-E (Option B): quarterly cron for runbook-live-infra-e2e.
    # First day of Jan / Apr / Jul / Oct at 06:00 UTC.
    - cron: "0 6 1 1,4,7,10 *"


jobs:
  # ---------------------------------------------------------------------------
  # T100a-T100d: permission / response / search / raw-coordinate / KMS
  # isolation lints in warn mode. Each lint exits 0 unless its strict flag is
  # set, so step-level continue-on-error is belt-and-suspenders.
  # ---------------------------------------------------------------------------
  permissions-lint-warn:
    name: Permissions lint (warn mode, T100a-T100d)
    runs-on: ubuntu-latest
    # Job-level continue-on-error so the overall status is not red while
    # warn-mode is in effect (`permissions-strict-gate` flips this to a
    # blocking job when invoked).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      # T100a - every path operation must go through the Permission guard
      # (is_allowed / Depends(check_action())).
      - name: Lint - permission guard coverage (T100a)
        continue-on-error: true
        run: python scripts/lint_permission_guard.py

      # T100b - every Recording / Detection / Site response must pass through
      # the ResponseFilter sanitizer.
      - name: Lint - response filter coverage (T100b)
        continue-on-error: true
        run: python scripts/lint_response_filter.py

      # T100c - every Detection search must go through the SearchGate
      # abstraction; direct `select(Detection)` in API code is forbidden.
      - name: Lint - search gate coverage (T100c)
        continue-on-error: true
        run: python scripts/lint_search_gate.py

      # T100d (1/2) - migrations / ORM / Pydantic must not introduce raw
      # lat/lng/gps_* columns or fields (FR-028f, FR-091b).
      - name: Lint - no raw coordinates (T100d)
        continue-on-error: true
        run: python scripts/lint_no_raw_coordinates.py

      # T100d (2/2) - the 4 KMS CMK aliases must remain isolated; no code
      # path may reuse a single alias across distinct purposes (SC-019).
      # NOTE: lint_kms_isolation.py is strict-by-default; pass --no-fail
      # explicitly so the warn-mode job does not flip the step red.
      - name: Lint - KMS alias isolation (T100d)
        continue-on-error: true
        run: python scripts/lint_kms_isolation.py --no-fail

  # ---------------------------------------------------------------------------
  # T100e: OpenAPI raw-coordinate leak assertion.
  #
  # We dump the live FastAPI app's OpenAPI document inside CI, then run the
  # recursive denylist check (scripts/assert_openapi_no_coords.py) plus a
  # belt-and-suspenders `grep` for the raw quoted keys. Phase 2 runs this
  # in warn mode (job-level continue-on-error); the strict gate runs the
  # exact same assertion with continue-on-error disabled.
  # ---------------------------------------------------------------------------
  permissions-openapi-assert:
    name: Permissions OpenAPI leak check (warn mode, T100e)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # The FastAPI app instantiates at module import; provide minimal env
      # so importing echoroo.main does not crash on settings validation.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      RESEND_API_KEY: re_ci_dummy
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Generate OpenAPI document
        continue-on-error: true
        working-directory: apps/api
        run: uv run python ../../scripts/dump_openapi.py --out openapi.json

      - name: Assert no raw coordinates leak (recursive)
        continue-on-error: true
        run: |
          if [ ! -f apps/api/openapi.json ]; then
            echo "::warning::OpenAPI dump unavailable; skipping assertion"
            exit 0
          fi
          python scripts/assert_openapi_no_coords.py apps/api/openapi.json

      - name: Belt-and-suspenders grep for quoted lat/lng keys
        continue-on-error: true
        run: |
          if [ ! -f apps/api/openapi.json ]; then
            echo "::warning::OpenAPI dump unavailable; skipping grep"
            exit 0
          fi
          # Any hit prints a warning and fails the step (job-level
          # continue-on-error keeps CI green during Phase 2).
          if grep -E '"(lat|lng|latitude|longitude|coordinates|geo_point)"' \
              apps/api/openapi.json; then
            echo "::warning::raw coordinate keys leaked into openapi.json"
            exit 1
          fi
          echo "openapi.json: no raw coordinate keys found"

  # ---------------------------------------------------------------------------
  # Phase 17 backlog A-9 (T979f) — supply-chain hybrid gate.
  #
  # This job enforces TWO independent guarantees against `apps/api/uv.lock`,
  # both required by FR-091b (Vulnerable & Outdated Components, Software &
  # Data Integrity Failures — OWASP A06 / A08):
  #
  #   1. **Wheel hash chain verification (dependency-substitution defence).**
  #      ``uv sync --locked`` installs from `uv.lock` and verifies the
  #      recorded wheel hashes against the downloaded artifacts. Any
  #      tampering with the lockfile (e.g. an attacker substituting a
  #      malicious wheel hash) fails this step and blocks merge. This is the
  #      *actual* `--require-hashes` equivalent for the spec — see Round 3
  #      empirical proof: ``pip-audit --disable-pip --require-hashes`` does
  #      NOT validate wheel hashes (the flag is parsed but becomes a no-op
  #      once the internal pip resolver is disabled).
  #
  #   2. **CVE advisory check (known-vulnerability defence).**
  #      ``pip-audit --disable-pip`` consults the OSV / PyPI advisory DB for
  #      known CVEs in the exported lockfile dependencies. ``--disable-pip``
  #      skips the internal virtual-env install (which fails on multi-version
  #      markers like ``backports-strenum`` / ``ai-edge-litert``).
  #
  # Both steps run hard-fail (no `continue-on-error` at job or step level),
  # so either a hash mismatch OR a CVE detection blocks merge.
  #
  # Design notes:
  # - `pip-audit` is invoked via `uvx` (an ephemeral, version-pinned install)
  #   so it never pollutes `pyproject.toml` or `uv.lock`.
  # - `--no-emit-project` excludes the local `echoroo` package from the
  #   exported requirements; pip-audit cannot resolve VCS / path
  #   distributions and the local source is not a published advisory target.
  # - When a CVE is detected we either bump the affected dependency in
  #   `uv.lock` or add a documented `--ignore-vuln <GHSA-id>` entry with a
  #   follow-up ticket.
  #
  # No untrusted GitHub event inputs (issue/PR titles, commit messages,
  # head_ref, etc.) are interpolated into any `run:` block, so the workflow
  # is not exposed to script-injection via PR metadata.
  # ---------------------------------------------------------------------------
  supply-chain:
    name: Supply-chain hybrid gate (uv hash chain + pip-audit, T979f)
    runs-on: ubuntu-latest
    # Codex Round-3 review note: 10 min was tight on cold-cache runs because
    # ``uv sync --all-extras --dev`` pulls TensorFlow / Torch / CUDA wheels.
    # Bumped to 15 min for headroom; warm-cache runs still finish under 5 min.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Verify uv.lock hash chain (dependency substitution defence)
        working-directory: apps/api
        # Round 3 (2026-05-04): ``uv sync --locked`` installs from uv.lock
        # and verifies wheel hashes against the recorded manifest. Any
        # tampering with the lockfile (substitute hash for malicious wheel)
        # fails this step and blocks merge. This is the *actual*
        # ``--require-hashes`` equivalent for spec FR-091b — pip-audit
        # ``--disable-pip`` below is advisory-only and does NOT validate
        # wheel hashes (proven empirically in Round 3 review).
        run: |
          uv sync --locked --all-extras --dev
          echo "uv.lock hash chain verified ($(wc -l < uv.lock) lines)"

      - name: Export uv.lock to hashed requirements.txt
        working-directory: apps/api
        run: |
          uv export --format requirements.txt --locked --no-emit-project \
            -o requirements.lock.txt
          echo "Exported $(wc -l < requirements.lock.txt) lines from uv.lock"

      - name: Run pip-audit (CVE advisory check, advisory-only)
        working-directory: apps/api
        # Round 3 (2026-05-04): pip-audit consults the OSV / PyPI advisory
        # DB for known CVEs in the exported lockfile dependencies.
        # ``--disable-pip`` skips the internal virtual-env install (which
        # would fail on multi-version markers like ``backports-strenum`` /
        # ``ai-edge-litert``). Note: with ``--disable-pip`` the
        # ``--require-hashes`` flag becomes a no-op — wheel hash
        # verification is handled by the ``uv sync --locked`` step ABOVE,
        # which actually blocks merge on hash tampering. The flag has been
        # removed here to avoid suggesting it provides a guarantee it does
        # not.
        # 2026-05-12: ``continue-on-error: true`` restores the documented
        # "advisory-only" semantics — the uv hash chain above is the
        # blocking gate; pip-audit annotates but does not fail the job.
        # The 2-step hybrid gate (Phase 17 A-9 design) requires this flag.
        continue-on-error: true
        run: |
          uvx pip-audit==2.10.0 \
            --disable-pip \
            --strict \
            --progress-spinner off \
            -r requirements.lock.txt

  # ---------------------------------------------------------------------------
  # T100f: STRICT gate — every Phase-2 lint with --fail-on-violation +
  # the endpoint-coverage reflection test. This is the merge-gate that
  # signals Phase 3+ work may begin.
  #
  # Phase 2.10 #7 (2026-04-25): the gate is now ALWAYS-ON. Each lint's
  # legacy violations are baselined into per-script allowlist files
  # under `scripts/allowlists/*.txt` so that a green run remains
  # reachable on this branch while Phase 3 work is in flight. Phase 3
  # MUST drive each allowlist to empty before final cleanup; new
  # violations introduced after the baseline date will fail the gate.
  # ---------------------------------------------------------------------------
  permissions-strict-gate:
    name: Permissions strict gate (T100f, Phase 3 entry condition)
    runs-on: ubuntu-latest
    # Intentionally NOT continue-on-error: a green run here is the
    # checkpoint to start Phase 3 work.
    continue-on-error: false
    env:
      # Phase 16 Batch 6h-5: postgres + redis services are now provisioned
      # in this job (see `services:` below) so the endpoint-coverage
      # reflection test (and any future strict-gate test that touches the
      # DB) can run against a real Postgres instance with the alembic
      # schema applied.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      RESEND_API_KEY: re_ci_dummy
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      ENVIRONMENT: development
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: echoroo_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      # Phase 16 Batch 6h-5: provision the echoroo_app role + GRANT
      # postgres membership BEFORE running migrations. The role is
      # required by the SC-022 trigger ``current_user = 'echoroo_app'``
      # check exercised in the superuser-last-protection race-condition
      # tests; the GRANT lets the connecting `postgres` superuser issue
      # ``SET ROLE echoroo_app`` from inside test transactions.
      - name: Provision echoroo_app role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'echoroo_app') THEN
                CREATE ROLE echoroo_app WITH LOGIN PASSWORD 'echoroo_app_test';
              END IF;
            END \$\$;
            GRANT ALL PRIVILEGES ON DATABASE echoroo_ci TO echoroo_app;
            GRANT ALL PRIVILEGES ON SCHEMA public TO echoroo_app;
            GRANT echoroo_app TO postgres;
          "

      - name: Apply alembic migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
        run: uv run alembic upgrade head

      - name: Re-grant on tables/sequences after migration
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO echoroo_app;
            GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO echoroo_app;
          "

      - name: Lint - permission guard coverage (strict)
        run: python scripts/lint_permission_guard.py --fail-on-violation

      - name: Lint - response filter coverage (strict)
        run: python scripts/lint_response_filter.py --fail-on-violation

      - name: Lint - search gate coverage (strict)
        run: python scripts/lint_search_gate.py --fail-on-violation

      - name: Lint - no raw coordinates (strict)
        run: python scripts/lint_no_raw_coordinates.py --fail-on-violation

      - name: Lint - KMS alias isolation (strict, default behaviour)
        run: python scripts/lint_kms_isolation.py

      - name: Generate OpenAPI document
        working-directory: apps/api
        run: uv run python ../../scripts/dump_openapi.py --out openapi.json

      - name: Assert no raw coordinates leak (strict)
        run: python scripts/assert_openapi_no_coords.py apps/api/openapi.json

      - name: Endpoint coverage reflection test
        working-directory: apps/api
        run: uv run pytest tests/security/authorization/test_endpoint_coverage.py -q

  # ---------------------------------------------------------------------------
  # Phase 2 foundation completion marker.
  #
  # This job depends on `permissions-strict-gate` so a green run signals
  # "Phase 2 done, Phase 3 may begin". Phase 2.10 #7 (2026-04-25)
  # promoted this marker from warn-only to a hard gate (continue-on-error
  # removed) now that the strict gate is reachable green via baseline
  # allowlists.
  # ---------------------------------------------------------------------------
  phase-2-foundation-complete:
    name: Phase 2 foundation complete (marker)
    needs: [permissions-strict-gate]
    if: always()
    runs-on: ubuntu-latest
    env:
      # Pull the upstream job result into an env var instead of
      # interpolating directly into the run: command, per the project's
      # Actions security guidance (no untrusted-context expansion in
      # shell strings, even though `needs.*.result` is workflow-internal).
      STRICT_GATE_RESULT: ${{ needs.permissions-strict-gate.result }}
    steps:
      - name: Report
        run: |
          echo "permissions-strict-gate result: $STRICT_GATE_RESULT"
          if [ "$STRICT_GATE_RESULT" = "success" ]; then
            echo "Phase 2 foundation gate GREEN — Phase 3+ may proceed."
          else
            echo "::warning::Phase 2 foundation gate not yet green (status: $STRICT_GATE_RESULT)"
          fi

  # ---------------------------------------------------------------------------
  # T995 (Phase 16 Batch 6h-1, R2 patch 2026-05-02): Mutation testing.
  #
  # **Phase 17 §D-1-bis closure (2026-05-09): now a hard gate.**
  #   The transitional `continue-on-error: true` warn-ratchet has been removed
  #   (PR #60). When this job runs, a surviving-mutant ratio < 80% in any of
  #   the 10 scorable modules turns the run red and blocks merge. The 11th
  #   target (`core/actions.py`) remains N/A — declarative catalog with no
  #   mutmut-generated mutants — and is intentionally excluded from the gate.
  #
  # **Trigger gating (unchanged in §D-1-bis closure)**: the job only RUNS when
  # one of three conditions holds, so a default PR build does not exercise it:
  #     a) main branch push (post-merge gate),
  #     b) the `run-mutation-testing` PR label is attached, OR
  #     c) the workflow is dispatched manually from the Actions UI
  #        (`workflow_dispatch`).
  #   Mutation runs are long (60-90 min for 10 modules); keeping the label /
  #   dispatch gate prevents default PR latency from blowing up.
  #
  # **§D-2 (every-push promotion)**: technically unblocked once §D-1-bis
  # closed, but deferred to a separate PR so we can weigh the 60-90 min
  # runtime impact on default PR latency separately from the warn-ratchet
  # removal. Tracked in `PHASE17_BACKLOG.md` §D-2.
  #
  # **Operator note**: BEFORE merging to `main`, manually trigger this job
  # via the `workflow_dispatch` UI (or attach `run-mutation-testing` to the
  # PR) so the post-merge gate is not the first time it runs against the
  # candidate.
  #
  # Scope (11 modules, of which 10 are scorable):
  #   Required:  core/permissions.py, core/actions.py (N/A — declarative),
  #              services/superuser_service.py, services/api_key_verification.py
  #   Additional: middleware/auth.py, middleware/auth_router.py,
  #               services/webauthn_service.py, workers/dormancy_check.py
  #   Existing:  core/response_filter.py, core/audit.py, core/kms.py
  # ---------------------------------------------------------------------------
  mutation-testing:
    name: Mutation testing (T995, hard gate >= 80% per module)
    # Phase 16 R2: include `workflow_dispatch` so operators can trigger the
    # job manually from the Actions UI ahead of a main merge. Phase 17 will
    # remove this gating entirely and run on every push.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      contains(github.event.pull_request.labels.*.name, 'run-mutation-testing')
    runs-on: ubuntu-latest
    # Phase 17 §D-1-bis closure (2026-05-09, PR #60 — this PR):
    #   All 10 scorable modules have reached >= 80% per-module mutation score
    #   (final ramp via PR #59 dormancy_check helper extraction: 74.6% -> 81.9%).
    #   The transitional `continue-on-error: true` warn-ratchet has been removed
    #   and `mutation-testing` is once again a hard gate: any module dropping
    #   below 80% (via `scripts/check_mutation_score.py --threshold 80`) or any
    #   non-zero exit from `scripts/run_mutmut.py run` will hard-fail the job.
    #
    # Final per-module scores (PR #59 run 25600683403):
    #   core.audit 97.3% / core.kms 91.7% / core.permissions 97.2% /
    #   core.response_filter 100% / middleware.auth 100% /
    #   middleware.auth_router 94.9% / services.api_key_verification 87.4% /
    #   services.superuser_service 84.1% / services.webauthn_service 86.0% /
    #   workers.dormancy_check 81.9%
    #   (core.actions: N/A — declarative catalog, mutmut produces no mutants.)
    #
    # §D-2 (every-push promotion) is now technically unblocked but deferred to
    # a separate PR — it requires judgment on the 60-90 min runtime impact on
    # default PR latency. The `if:` guard above still gates the run to main
    # pushes / `run-mutation-testing` PR label / `workflow_dispatch`.
    env:
      # mutmut reads configuration from pyproject.toml [tool.mutmut] only
      # (mutmut 3.x; apps/api/mutmut.toml was dead config and has been removed).
      # tests/security/ requires a real Postgres/Redis (the autouse moto
      # fixture in tests/{integration,security}/conftest.py covers AWS only).
      # Without these env vars the baseline pytest exits non-zero and mutmut
      # reports every mutant as "not checked". This block mirrors the
      # security-tests job env.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      RESEND_API_KEY: re_ci_dummy
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      ENVIRONMENT: development
      REPO_ROOT: ${{ github.workspace }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_KMS_REGION: us-east-1
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: echoroo_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Provision echoroo_app role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'echoroo_app') THEN
                CREATE ROLE echoroo_app WITH LOGIN PASSWORD 'echoroo_app_test';
              END IF;
            END \$\$;
            GRANT ALL PRIVILEGES ON DATABASE echoroo_ci TO echoroo_app;
            GRANT ALL PRIVILEGES ON SCHEMA public TO echoroo_app;
            GRANT echoroo_app TO postgres;
          "

      - name: Apply alembic migrations
        working-directory: apps/api
        run: uv run alembic upgrade head

      - name: Re-grant on tables/sequences after migration
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO echoroo_app;
            GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO echoroo_app;
          "

      # Phase 17 §C-D diagnostic preflight: run the exact pytest command
      # that mutmut uses for `run_stats`. First with --collect-only to
      # confirm collection, then a real (no-collect-only) run with the
      # security/unit suites to see if some baseline test fails or the
      # in-process pytest crashes. `|| true` everywhere; the artifact is
      # the interesting datum.
      - name: Diagnostic - run mutmut baseline pytest manually
        if: always()
        working-directory: apps/api
        run: |
          set +e
          {
            echo "=== preflight 1: --collect-only ==="
            uv run python -m pytest \
              --rootdir=. --tb=native -x -q --no-cov \
              --override-ini=addopts= \
              tests/unit/ tests/security/ \
              --collect-only
            collect_rc=$?
            echo "collect-only exit: $collect_rc"

            echo ""
            echo "=== preflight 2: actual mutmut baseline (first 5 failures) ==="
            uv run python -m pytest \
              --rootdir=. --tb=native -q --no-cov \
              --override-ini=addopts= \
              tests/unit/ tests/security/ \
              --maxfail=5 -rA
            run_rc=$?
            echo "actual-run exit: $run_rc"
          } > /tmp/mutmut_pytest_preflight.log 2>&1
          tail -250 /tmp/mutmut_pytest_preflight.log
          # Always exit 0; mutmut itself is the authoritative gate.
          exit 0

      - name: Upload preflight pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-pytest-preflight
          path: /tmp/mutmut_pytest_preflight.log
          retention-days: 7

      # Phase 17 §C-D second diagnostic: confirm whether the mutmut
      # baseline failure is specifically about mutmut's in-process
      # `pytest.main()` invocation (vs the suite or args). Subprocess
      # pytest exits 0 in the preflight; this step runs the same args
      # via in-process `pytest.main()` to compare. If exit code != 0
      # (and != 5), the failure is mutmut's embedded pytest path, not
      # the suite.
      - name: Diagnostic - in-process pytest.main() exit code
        if: always()
        working-directory: apps/api
        run: |
          set +e
          uv run python -c "
          import pytest
          rc = pytest.main([
              '--rootdir=.', '--tb=native', '-x', '-q',
              '--no-cov', '--override-ini=addopts=',
              'tests/unit/', 'tests/security/',
          ])
          print('IN_PROCESS_PYTEST_EXIT', int(rc))
          " 2>&1 | tail -50
          exit 0

      # Phase 17 §D-0 Option B: run mutmut via the subprocess-stats wrapper.
      # scripts/run_mutmut.py monkey-patches PytestRunner.run_stats to spawn
      # pytest in a subprocess instead of calling pytest.main() in-process,
      # avoiding the in-process USAGE_ERROR (exit 4) / BadTestExecutionCommandsException
      # that blocked baseline stats collection (see PHASE17_BACKLOG §D-0).
      # Exit code 0 = all mutants killed or no mutants; 1 = survivors
      # exist (expected when coverage is < 100%). The score check step
      # below is the authoritative gate.
      #
      # No `|| true` here: the warn-ratchet was removed in PR #60 (§D-1-bis
      # closure). Any non-zero exit from mutmut (survivors / infra error) now
      # hard-fails the job, and the score-gate step below provides the
      # authoritative >= 80% per-module assertion on top of that.
      - name: Run mutmut (10 scorable modules, hard gate)
        working-directory: apps/api
        run: uv run python scripts/run_mutmut.py run

      # Collect results for CI artifact upload.  ``--all`` includes killed
      # mutants (the default ``mutmut results`` omits them), which makes the
      # artifact the authoritative per-mutant log and matches what
      # ``check_mutation_score.py`` reads internally.
      # NOTE: mutmut 3.5 declares ``--all`` as ``@click.option('--all',
      # default=False)`` WITHOUT ``is_flag=True``, so the option requires a
      # value — pass ``--all=true`` rather than the bare ``--all`` flag.
      - name: Collect mutmut results
        if: always()
        working-directory: apps/api
        run: uv run mutmut results --all=true 2>&1 | tee /tmp/mutmut_results.txt || true

      # Enforce >= 80% threshold per module.
      # scripts/check_mutation_score.py parses `mutmut results` output and
      # exits 1 if any module is below 80%. This is the gate step.
      # Must run via `uv run` so the script's `sys.executable -m mutmut`
      # subprocess resolves against apps/api/.venv (which has mutmut),
      # not the workflow's root VIRTUAL_ENV.
      - name: Enforce 80% mutation score threshold
        if: always()
        working-directory: apps/api
        run: uv run python ../../scripts/check_mutation_score.py --threshold 80

      # Upload mutmut cache as an artifact for debugging surviving mutants.
      - name: Upload mutmut results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-results
          path: |
            apps/api/.mutmut-cache
            /tmp/mutmut_results.txt
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Dedicated security pytest job - always blocking.
  # Runs only tests tagged with the `security` pytest marker. The marker is
  # used by the security-focused negative tests under
  # `apps/api/tests/security/`.
  # ---------------------------------------------------------------------------
  security-tests:
    name: security-tests
    runs-on: ubuntu-latest
    # Phase 17 §C closure (2026-05-07): the warn-ratchet `continue-on-error`
    # marker has been removed after two consecutive 0-failure main runs
    # (PR #36 advisory_lock xfail and PR #37 release-readiness checklist).
    # Earlier runner-surface flakes (postgres testcontainer, redis race in
    # rate-limit suite) were fixed by PR-C0/C2/C3/C5 (junit observability,
    # pgvector image pinning, autouse moto KMS fixture, conftest tightening).
    # See PHASE17_BACKLOG.md §C history.
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      RESEND_API_KEY: re_ci_dummy
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      ENVIRONMENT: development
      # Phase 17 A-8: tests/security/crypto/test_dek_rewrap_and_kms_isolation.py
      # walks upward from __file__ to locate scripts/rewrap_dek.py and
      # scripts/lint_kms_isolation.py. Setting REPO_ROOT to the workspace
      # short-circuits the search and lets the test fail loudly when the
      # script is missing instead of silently skipping after a layout
      # change. The fallback upward search remains for local pytest runs.
      REPO_ROOT: ${{ github.workspace }}
      # PR-C5 (Phase 17 §C, 2026-05-07): minimal AWS baseline.
      # The autouse moto fixture in tests/{integration,security}/conftest.py
      # is the primary KMS isolation mechanism. The job-level vars below
      # cover only the cases the fixture cannot reach: dummy credentials
      # and a pinned region so boto3 client construction in module-import
      # / session-scoped fixtures does not raise NoCredentialsError before
      # the autouse fixture has a chance to run. AWS_ENDPOINT_URL_KMS is
      # intentionally unset so moto's default endpoint discovery can
      # interpose its in-process fake; the fixture delenvs it as well.
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_KMS_REGION: us-east-1
      # Alias env vars are intentionally NOT pinned here. The autouse
      # moto fixture in tests/{integration,security}/conftest.py always
      # rewrites them to canonical values matching the freshly-provisioned
      # CMKs. Pinning them at the job level would create a false sense of
      # safety: any code path that bypasses the autouse fixture would
      # still raise UnrecognizedClientException because no real CMK
      # exists at the pinned alias, and we would lose the loud signal
      # that the autouse fixture failed to load.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: echoroo_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Provision echoroo_app role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'echoroo_app') THEN
                CREATE ROLE echoroo_app WITH LOGIN PASSWORD 'echoroo_app_test';
              END IF;
            END \$\$;
            GRANT ALL PRIVILEGES ON DATABASE echoroo_ci TO echoroo_app;
            GRANT ALL PRIVILEGES ON SCHEMA public TO echoroo_app;
            GRANT echoroo_app TO postgres;
          "

      - name: Apply alembic migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
        run: uv run alembic upgrade head

      - name: Re-grant on tables/sequences after migration
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO echoroo_app;
            GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO echoroo_app;
          "

      - name: Run pytest -m security
        working-directory: apps/api
        # Codex Minor 3 (Phase 16 6g-2 R2): explicitly deselect the
        # ``performance`` marker. The ``security`` selector already implies
        # "not performance" because no test carries both markers, but the
        # redundant deselect documents the intent and protects against
        # accidental cross-tagging.
        #
        # Phase 17 PR-C0: ``--maxfail=20`` (raised from 1) so the failure
        # distribution is observable when investigating CI flake. ``-rA``
        # prints a short summary of every failure at the end of the run so
        # the pattern is visible without scrolling. ``--junitxml`` emits a
        # machine-readable failure report that PR-C0 uploads as an artifact.
        run: |
          uv run pytest \
            -m "security and not performance" \
            --maxfail=20 -q -rA \
            --junitxml=junit-security.xml

      # Phase 17 PR-C0: surface the security suite's junit report so failure
      # patterns can be inspected without re-running the suite locally.
      - name: Upload security-tests reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-tests-reports
          path: apps/api/junit-security.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Phase 16 Batch 6g-2 R2 (Codex Minor 3): default backend pytest job that
  # explicitly **deselects** the ``performance`` and ``slow`` markers. The
  # ``performance`` tests measure latency / p95 budgets and are environment-
  # sensitive (GitHub-hosted runners flap), and ``slow`` tests cost too much
  # to run on every push. Both are opt-in only — run locally via
  # ``pytest -m performance`` with ``RUN_PERF_LATENCY=true`` for the latency
  # gate.
  #
  # T996 (Phase 16 Batch 6h-2, R2 patch 2026-05-02): coverage gate.
  #
  # **Phase 17 §C closure (2026-05-08): hard gate, NOT warn-ratchet.**
  #   - pytest-cov produces coverage.json; scripts/check_coverage_threshold.py
  #     enforces:
  #       - permission-critical modules: >= 95%
  #       - all other echoroo modules:   >= 85%
  #   - Modules in PHASE17_PENDING are warn-only (WARN(ph17) in the table);
  #     only non-pending modules that fall below threshold hard-fail.
  #   - Pre-existing test failures from Phase 16 baseline (33F + 94E) are
  #     resolved: the suite now runs 0 hard-failures on main HEAD (all
  #     expected failures carry xfail markers). The postgres testcontainer
  #     was replaced by a service container in Phase 16 Batch 6h-5.
  #   - Six Phase 17 A-series modules (celery_app, api_key_age_check,
  #     pii_hash_backfill, two_factor_tasks, two_factor_confirmation_token,
  #     two_factor_reset_service) have been added to PHASE17_PENDING so the
  #     gate is clean at current HEAD.
  # ---------------------------------------------------------------------------
  backend-tests:
    name: backend-tests (hard gate; Phase 17 §C closure)
    runs-on: ubuntu-latest
    # Phase 17 §C closure (2026-05-08): continue-on-error removed.
    # The warn-ratchet posture is retired now that:
    #   (a) pre-existing pytest failures are all xfail/xpass — test suite
    #       is green (0 hard failures on main HEAD 2cd3b8b2 as of 2026-05-08),
    #   (b) postgres testcontainer replaced by service container (6h-5),
    #   (c) six newly-added Phase 17 A-series workers/services
    #       (celery_app, api_key_age_check, pii_hash_backfill, two_factor_tasks,
    #       two_factor_confirmation_token, two_factor_reset_service) that lacked
    #       dedicated test fixtures have been added to PHASE17_PENDING in
    #       scripts/check_coverage_threshold.py so the coverage gate treats
    #       them as warn-only without hard-failing.
    # See PHASE17_BACKLOG.md §C for the full history.
    env:
      # Phase 16 Batch 6h-5: postgres + redis services are now provisioned
      # in this job (see `services:` below) so async DB-bound tests can
      # connect during pytest collection without resorting to skip
      # markers.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      RESEND_API_KEY: re_ci_dummy
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      ENVIRONMENT: development
      # PR-C5 (Phase 17 §C, 2026-05-07): minimal AWS baseline.
      # See the security-tests env block above for the full rationale.
      # The autouse moto fixture in tests/integration/conftest.py is the
      # primary KMS isolation mechanism; these vars only cover the cases
      # the fixture cannot reach (module-import / session-scoped paths).
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_KMS_REGION: us-east-1
      # Alias env vars are intentionally NOT pinned here. The autouse
      # moto fixture in tests/{integration,security}/conftest.py always
      # rewrites them to canonical values matching the freshly-provisioned
      # CMKs. Pinning them at the job level would create a false sense of
      # safety: any code path that bypasses the autouse fixture would
      # still raise UnrecognizedClientException because no real CMK
      # exists at the pinned alias, and we would lose the loud signal
      # that the autouse fixture failed to load.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: echoroo_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      - name: Provision echoroo_app role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'echoroo_app') THEN
                CREATE ROLE echoroo_app WITH LOGIN PASSWORD 'echoroo_app_test';
              END IF;
            END \$\$;
            GRANT ALL PRIVILEGES ON DATABASE echoroo_ci TO echoroo_app;
            GRANT ALL PRIVILEGES ON SCHEMA public TO echoroo_app;
            GRANT echoroo_app TO postgres;
          "

      - name: Apply alembic migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
        run: uv run alembic upgrade head

      - name: Re-grant on tables/sequences after migration
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO echoroo_app;
            GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO echoroo_app;
          "

      # T996: emit coverage.json + XML + term-missing alongside the standard
      # test run. The coverage reports are uploaded as artifacts even on
      # failure so that the threshold script can still run.
      #
      # Phase 17 PR-C0: ``--maxfail=20`` (raised from 1) so the failure
      # distribution is observable while burning down the 33F+94E baseline
      # tracked in PHASE17_BACKLOG.md §C. With ``--maxfail=1`` a single
      # early-failing test (e.g. vector extension flake) hides the rest of
      # the failure pattern, making it impossible to triage. ``-rA`` prints
      # a short summary of every failure at the end of the run.
      # ``--junitxml`` emits a machine-readable report uploaded below.
      #
      # Phase 17 PR-C3: ``not requires_runbook`` was missing from this
      # filter, causing tests/runbook/test_quickstart_phase3_smoke.py
      # live-infra tests to run inside backend-tests (which does not
      # provision the live KMS / S3 / IUCN stack) and AssertionError
      # with "Unable to locate credentials". The dedicated
      # ``runbook-smoke-tests`` job already runs these correctly with
      # ``-m "not requires_runbook"``; pyproject.toml documents the
      # contract.
      - name: Run pytest with coverage (-m "not performance and not slow and not requires_runbook")
        working-directory: apps/api
        # The marker description in pyproject.toml documents this default
        # skip; do not change one without the other.
        run: |
          uv run pytest \
            -m "not performance and not slow and not requires_runbook" \
            --maxfail=20 -q -rA \
            --junitxml=junit-backend.xml \
            --cov=echoroo \
            --cov-report=json \
            --cov-report=xml \
            --cov-report=term-missing

      # Upload coverage + junit reports as CI artifact for inspection /
      # trend tracking. Phase 17 PR-C0 added junit-backend.xml.
      - name: Upload coverage + test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            apps/api/coverage.json
            apps/api/coverage.xml
            apps/api/junit-backend.xml
          retention-days: 14

      # T996: enforce per-module thresholds.
      #   permission modules: 95%   other modules: 85%
      # Exit 1 if any module is below its threshold.
      # The script also prints the full per-module table for CI log visibility.
      - name: Enforce coverage thresholds (T996, 95%/85%)
        if: always()
        working-directory: apps/api
        run: python ../../scripts/check_coverage_threshold.py coverage.json

  # ---------------------------------------------------------------------------
  # T998 (Phase 16 Batch 6h-3): runbook smoke test gate.
  #
  # Validates that the four quickstart §3 bootstrap scripts (wipe_database,
  # init_superuser, initial_iucn_sync, seed_moe_rdb) keep working as
  # operator-facing CLIs:
  #
  #   * ``--help`` exits 0 and prints the documented usage banner.
  #   * Running without ``--confirm`` (or required positional args) refuses
  #     non-zero so destructive defaults can never silently regress.
  #   * The argparse argument schema is pinned so a refactor that changes
  #     flag names lights this gate up.
  #
  # The job runs the smoke subset only — ``-m "not requires_runbook"`` skips
  # the live-infra integration tests that need a Docker Compose dev stack
  # with PostgreSQL / Redis / LocalStack / KMS aliases provisioned. Operators
  # opt in locally via ``pytest -m requires_runbook`` per quickstart §3.
  # ---------------------------------------------------------------------------
  runbook-smoke-tests:
    name: Runbook smoke tests (T998, quickstart §3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      # Smoke subset only — see job comment above for marker rationale.
      # ``--no-cov`` disables coverage measurement for this fast gate so the
      # job runs under a few seconds even on a cold runner. Coverage of the
      # operational scripts is intentionally excluded from the T996 gate
      # (see pyproject.toml ``[tool.coverage.run] omit``).
      - name: Run runbook smoke tests
        working-directory: apps/api
        run: uv run pytest tests/runbook/ -m "not requires_runbook" --no-cov -q

  # ---------------------------------------------------------------------------
  # Phase 17 §D-0 follow-up (PR #47, 2026-05-08): AST guard preventing
  # regressions where someone adds ``@pytest.fixture`` on an ``async def``
  # fixture under apps/api/tests/{unit,security} or apps/api/conftest.py.
  #
  # mutmut's in-process ``pytest.main([...], plugins=[stats_collector])`` runs
  # with ``--override-ini=asyncio_mode=strict`` (see pyproject.toml
  # [tool.mutmut].pytest_add_cli_args). Strict mode requires async fixtures
  # to use ``@pytest_asyncio.fixture``; a plain ``@pytest.fixture`` on an
  # ``async def`` produces an async generator object that strict mode refuses
  # to await, breaking mutmut's baseline (exit 4 / USAGE_ERROR) and any
  # downstream test that consumes the fixture.
  #
  # PR #47 converted all 68 pre-existing offending fixtures across 16 files.
  # This job is the static guard that prevents future regressions; without it
  # the §D-0 fix can silently reverse the next time someone copies a synchronous
  # fixture template into an async one.
  #
  # The job is intentionally cheap (a single stdlib-only AST pass) so it runs
  # on every push without raising CI latency. Hard-fail (no continue-on-error):
  # one regression and the gate goes red.
  # ---------------------------------------------------------------------------
  no-plain-pytest-fixture-on-async:
    name: No plain @pytest.fixture on async fixtures (Phase 17 §D-0 guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Stdlib-only script (ast / argparse / pathlib / sys); no dependency
      # install required. Keeps the gate fast and isolated from the backend
      # virtualenv.
      - name: Verify async fixtures use @pytest_asyncio.fixture
        run: python scripts/check_no_plain_pytest_fixture_on_async.py

  # ---------------------------------------------------------------------------
  # T999 (Phase 16 Batch 6h-4): requirements traceability gate.
  #
  # The 006-permissions-redesign feature mandates that every FR / NFR / PR / SC
  # identifier in spec.md is linked from requirements-traceability.md (see
  # plan.md codex review D-9). This gate runs the recipe documented inline in
  # requirements-traceability.md §"CI での未リンク検出" — `comm -23 spec_ids
  # trace_ids` MUST be empty. The script also reports orphans (trace IDs no
  # longer present in spec) as informational output.
  #
  # The job is intentionally cheap (a single Python regex pass over two
  # markdown files) so it runs on every push without raising CI latency.
  # Hard-fail (no continue-on-error): a missing trace row is a docs gate
  # failure that blocks Phase 16 close.
  # ---------------------------------------------------------------------------
  requirements-traceability:
    name: Requirements traceability (T999, spec ↔ trace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The script uses only stdlib (re, argparse, pathlib) so no dependency
      # install step is required. This keeps the gate fast and isolated from
      # the backend test suite.
      - name: Verify spec IDs are linked from traceability matrix
        run: python scripts/check_traceability.py

  # ---------------------------------------------------------------------------
  # Phase 17 §C-E: Runbook live-infra E2E (requires_runbook marker).
  #
  # This job runs the single ``requires_runbook``-gated test that exercises
  # ``echoroo.scripts.check_wipe_guard`` against a live Postgres + S3
  # (LocalStack) stack. The test is intentionally NOT a per-PR hard gate
  # (Option B, quarterly cron + manual dispatch) because:
  #
  #   * The runbook smoke suite (``runbook-smoke-tests``) covers argparse
  #     surface on every push with no infra.
  #   * Live-infra provisioning (LocalStack ~30 s cold start) adds too much
  #     latency to make it a per-PR default.
  #   * The risk profile (silent drift of a one-off bootstrap CLI) suits a
  #     quarterly health-check cadence rather than a per-PR gate.
  #
  # Trigger policy: ``workflow_dispatch`` OR ``schedule`` (quarterly cron,
  # first day of Jan/Apr/Jul/Oct at 06:00 UTC). Never fires on push/PR.
  #
  # Services wired:
  #   * pgvector/pgvector:pg16 — Postgres 16 with pgvector extension
  #   * redis:7                — not required by check_wipe_guard, but
  #                              provisioned so settings validation passes
  #   * localstack/localstack  — S3 endpoint for check_wipe_guard's S3 check
  #
  # Exit-code contract: the test asserts ``returncode in (0, 10, 11, 12)`` —
  # all three are legitimate "script ran end-to-end" outcomes. On a freshly
  # migrated CI stack the typical code is 11 (alembic version != baseline
  # "0001") or 12 (S3 genesis marker absent). rc=20 (infra unreachable)
  # fails the job because it means the services wiring below is broken.
  #
  # On failure: a GitHub issue is auto-created via ``actions/github-script``
  # with the run URL and last 50 lines of pytest output so the on-call
  # operator has an actionable starting point without downloading artifacts.
  #
  # Security note: no untrusted event inputs are interpolated into ``run:``
  # blocks. The RUN_URL and PYTEST_OUTPUT env vars are populated from
  # ``github.server_url`` / ``github.run_id`` (workflow-internal, not
  # attacker-controlled) and a captured log file respectively.
  # ---------------------------------------------------------------------------
  runbook-live-infra-e2e:
    name: Runbook live-infra E2E (requires_runbook, Phase 17 §C-E)
    # Only run on manual dispatch or the quarterly schedule; never on push/PR.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    runs-on: ubuntu-latest
    # Hard fail when it runs — but it does not gate PRs (see trigger policy).
    continue-on-error: false
    permissions:
      # Required for the auto-issue creation step (actions/github-script).
      issues: write
      contents: read
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      RESEND_API_KEY: re_ci_dummy
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      ENVIRONMENT: development
      # LocalStack S3 endpoint — check_wipe_guard reads S3_PUBLIC_ENDPOINT_URL
      # from app settings to locate the audit bucket genesis marker.
      AWS_ENDPOINT_URL: http://localhost:4566
      S3_PUBLIC_ENDPOINT_URL: http://localhost:4566
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      # Bucket used by check_wipe_guard (AUDIT_LOG_BUCKET falls back to S3_BUCKET).
      S3_BUCKET: echoroo-audit
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: echoroo_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health | python3 -c \"import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('services',{}).get('s3')=='available' else 1)\""
          --health-interval 15s
          --health-timeout 10s
          --health-retries 8
          --health-start-period 30s
        ports:
          - 4566:4566
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"
          pyproject-file: "apps/api/pyproject.toml"

      - name: Install backend dependencies
        working-directory: apps/api
        run: uv sync --all-extras --dev

      # Provision DB role required by alembic migrations (SC-022 trigger check).
      - name: Provision echoroo_app role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'echoroo_app') THEN
                CREATE ROLE echoroo_app WITH LOGIN PASSWORD 'echoroo_app_test';
              END IF;
            END \$\$;
            GRANT ALL PRIVILEGES ON DATABASE echoroo_ci TO echoroo_app;
            GRANT ALL PRIVILEGES ON SCHEMA public TO echoroo_app;
            GRANT echoroo_app TO postgres;
          "

      - name: Apply alembic migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/echoroo_ci
        run: uv run alembic upgrade head

      - name: Re-grant on tables/sequences after migration
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d echoroo_ci -c "
            GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO echoroo_app;
            GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO echoroo_app;
          "

      # Provision the S3 audit bucket in LocalStack so check_wipe_guard can
      # reach it (the S3 head_object call returns 404 for missing marker,
      # which is a legitimate non-crash exit code 12, not an infra failure).
      - name: Provision S3 audit bucket in LocalStack
        run: |
          aws --endpoint-url http://localhost:4566 s3 mb s3://echoroo-audit \
            --region us-east-1 || true
          echo "S3 audit bucket provisioned"

      # Run the live-infra test. Capture pytest output to a file so the
      # failure auto-issue step can include the last 50 lines without
      # shell interpolation of untrusted content.
      # IMPORTANT: ``tee`` would otherwise mask pytest's exit code (the pipeline
      # exit status defaults to ``tee``'s, which is ~always 0). We capture the
      # real pytest return code via ``${PIPESTATUS[0]}`` and ``exit`` it
      # explicitly so the step fails when pytest fails — that is what triggers
      # the ``if: failure()`` auto-issue creation step below.
      - name: Run pytest -m requires_runbook
        id: pytest_run
        working-directory: apps/api
        run: |
          set -o pipefail
          uv run pytest \
            -m requires_runbook \
            tests/runbook/ \
            --no-cov -q -rA \
            --junitxml=junit-runbook-live.xml \
            2>&1 | tee /tmp/pytest_runbook_live.log
          pytest_rc=${PIPESTATUS[0]}
          echo "exit_code=${pytest_rc}" >> "$GITHUB_OUTPUT"
          exit "${pytest_rc}"

      - name: Upload runbook live-infra test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runbook-live-infra-reports
          path: |
            apps/api/junit-runbook-live.xml
            /tmp/pytest_runbook_live.log
          retention-days: 30

      # Auto-create a GitHub issue on test failure so the on-call operator
      # is alerted with a direct link and the last 50 lines of pytest output.
      #
      # Security: RUN_URL is constructed only from workflow-internal context
      # variables (server_url + run_id), never from attacker-controlled inputs.
      # PYTEST_TAIL is read from a local log file captured above; it contains
      # only pytest output, not any GitHub event metadata.
      - name: Auto-create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const runUrl = process.env.RUN_URL;
            const today = new Date().toISOString().slice(0, 10);

            let pytestTail = '';
            try {
              const log = fs.readFileSync('/tmp/pytest_runbook_live.log', 'utf8');
              const lines = log.split('\n');
              pytestTail = lines.slice(-50).join('\n');
            } catch (e) {
              pytestTail = '(log file not available)';
            }

            const title = `[Runbook E2E] Quickstart §3 smoke failed (${today})`;
            const body = [
              '## Runbook live-infra E2E failure',
              '',
              `**Run**: ${runUrl}`,
              `**Date**: ${today}`,
              '',
              '### Last 50 lines of pytest output',
              '```',
              pytestTail,
              '```',
              '',
              '### Next steps',
              '1. Review the full log in the Actions run linked above.',
              '2. Download the `runbook-live-infra-reports` artifact for the JUnit XML.',
              '3. Check `apps/api/tests/runbook/test_quickstart_phase3_smoke.py` and',
              '   `apps/api/echoroo/scripts/check_wipe_guard.py` for regression.',
              '4. See `specs/006-permissions-redesign/PHASE17_BACKLOG.md §E` for context.',
            ].join('\n');

            // Labels ``runbook`` / ``ci-failure`` may not exist in the repo;
            // ``issues.create`` then returns HTTP 422 and the alert is lost.
            // Try with labels first; on any failure, retry without labels so
            // the on-call operator still gets the alert.
            const issueParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
            };
            try {
              await github.rest.issues.create({
                ...issueParams,
                labels: ['runbook', 'ci-failure'],
              });
            } catch (e) {
              core.warning(
                `Issue create with labels failed: ${e.message}. ` +
                'Retrying without labels.',
              );
              await github.rest.issues.create(issueParams);
            }
